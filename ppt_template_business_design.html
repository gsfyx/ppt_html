            restoreSelection();
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return;
            let range = selection.getRangeAt(0);
            if (range.collapsed && savedRange && !savedRange.collapsed && savedRange.startContainer && savedRange.endContainer && document.contains(savedRange.startContainer) && document.contains(savedRange.endContainer)) {
                selection.removeAllRanges();
                selection.addRange(savedRange.cloneRange());
                range = selection.getRangeAt(0);
            }
            if (range.collapsed) return;

            const span = document.createElement('span');
            span.style[styleName] = styleValue;

            try {
                range.surroundContents(span);
            } catch (err) {
                const frag = range.extractContents();
                span.appendChild(frag);
                range.insertNode(span);
            }

            const newRange = document.createRange();
            newRange.selectNodeContents(span);
            selection.removeAllRanges();
            selection.addRange(newRange);
            savedRange = newRange.cloneRange();
            if (lastEditableHost) {
                savedSelectionOffsets = getRangeOffsetsWithinHost(lastEditableHost, newRange) || savedSelectionOffsets;
            }
            if (lastEditableHost) {
                normalizeFontTags(lastEditableHost, 'Microsoft YaHei');
            }
        }

        function normalizeFontTags(editableRoot, fallbackFontKey) {
            if (!editableRoot) return;
            editableRoot.querySelectorAll('font[face]').forEach((fontNode) => {
                const face = (fontNode.getAttribute('face') || '').replace(/['"]/g, '').trim();
                const mapped = fontFamilyMap[face] || fontFamilyMap[fallbackFontKey] || face;
                if (!mapped) return;
                const span = document.createElement('span');
                span.style.fontFamily = mapped;
                span.innerHTML = fontNode.innerHTML;
                fontNode.parentNode?.replaceChild(span, fontNode);
            });
        }

        function applyFontFamily(fontKey) {
            const mapped = fontFamilyMap[fontKey] || fontKey;
            applyInlineStyleToSelection('fontFamily', mapped);
            if (lastEditableHost) {
                normalizeFontTags(lastEditableHost, fontKey);
            }
            saveSelection();
        }

        toolbar.addEventListener('pointerdown', (e) => {
            if (e.target.closest('select, input, option, button, .format-btn, .color-btn')) {
                saveSelection();
            }
        }, true);

        // 点击工具栏时阻止事件冒泡，防止编辑器失焦
        toolbar.addEventListener('mousedown', (e) => {
            const isControl = !!e.target.closest('select, input, option, button, .format-btn, .color-btn');
            if (!isControl && e.target === toolbar) {
                e.preventDefault();
                startToolbarDrag(e);
            }
            e.stopPropagation();
            saveSelection();
        });

        toolbar.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        const fontDropdown = toolbar.querySelector('#fontFamilyDropdown');
        const fontTrigger = toolbar.querySelector('#fontFamilyTrigger');
        const fontMenu = toolbar.querySelector('#fontFamilyMenu');

        function setFontDropdownValue(fontKey) {
            if (!fontDropdown || !fontTrigger || !fontMenu || !fontKey) return;
            const options = Array.from(fontMenu.querySelectorAll('.font-option'));
            const target = options.find((opt) => opt.getAttribute('data-value') === fontKey);
            if (!target) return;
            fontTrigger.textContent = target.textContent || fontKey;
            fontDropdown.dataset.value = fontKey;
            options.forEach((opt) => opt.classList.toggle('active', opt === target));
        }

        function closeFontMenu() {
            if (fontDropdown) fontDropdown.classList.remove('open');
        }

        if (fontDropdown && fontTrigger && fontMenu) {
            fontDropdown.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.font-dropdown-trigger, .font-option')) {
                    markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'));
                    saveSelection();
                }
            }, true);

            fontTrigger.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'));
                saveSelection();
                restoreSelection();
                fontDropdown.classList.toggle('open');
            });

            function applyFontFromOptionEvent(e) {
                const option = e.target.closest('.font-option');
                if (!option) return;
                e.preventDefault();
                e.stopPropagation();
                markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'));
                const nextFontFamily = option.getAttribute('data-value');
                if (!nextFontFamily) return;
                setFontDropdownValue(nextFontFamily);
                closeFontMenu();
                applyFontFamily(nextFontFamily);
                if (lastEditableHost) persistElementContent(lastEditableHost);
                const prefs = getCache().textStylePrefs && typeof getCache().textStylePrefs === 'object'
                    ? getCache().textStylePrefs
                    : {};
                prefs.fontFamily = nextFontFamily;
                updateCache('textStylePrefs', prefs);
                keepSelectionHighlighted();
                keepToolbarVisibleAfterFormatting();
            }

            fontMenu.addEventListener('mousedown', applyFontFromOptionEvent);

            document.addEventListener('mousedown', (e) => {
                if (!fontDropdown.classList.contains('open')) return;
                if (fontDropdown.contains(e.target)) return;
                closeFontMenu();
            });
        }

        // 绑定按钮事件（统一走“恢复选区 -> 执行命令 -> 保持高亮”流程）
        function normalizeColorToHex(colorValue) {
            if (!colorValue) return null;
            const color = String(colorValue).trim().toLowerCase();
            if (!color || color === 'transparent' || color === 'inherit' || color === 'initial') return null;
            const hexMatch = color.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (hexMatch) {
                const hex = hexMatch[1];
                if (hex.length === 3) return '#' + hex.split('').map((c) => c + c).join('').toLowerCase();
                return '#' + hex.toLowerCase();
            }
            const rgbMatch = color.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)$/i);
            if (!rgbMatch) return null;
            if (rgbMatch[4] !== undefined && Number(rgbMatch[4]) === 0) return null;
            const r = Math.max(0, Math.min(255, parseInt(rgbMatch[1], 10) || 0));
            const g = Math.max(0, Math.min(255, parseInt(rgbMatch[2], 10) || 0));
            const b = Math.max(0, Math.min(255, parseInt(rgbMatch[3], 10) || 0));
            const toHex = (v) => v.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function setColorIndicator(cmd, colorValue) {
            const btn = toolbar.querySelector(`.color-btn[data-cmd="${cmd}"]`);
            const indicator = btn ? btn.querySelector('.color-indicator') : null;
            const normalized = normalizeColorToHex(colorValue);
            if (!btn || !indicator || !normalized) return;
            indicator.style.backgroundColor = normalized;
            btn.dataset.value = normalized;
        }

        function updateColorPrefs(cmd, colorValue) {
            const normalized = normalizeColorToHex(colorValue);
            if (!normalized) return;
            const prefs = getCache().textStylePrefs && typeof getCache().textStylePrefs === 'object'
                ? getCache().textStylePrefs
                : {};
            if (cmd === 'hiliteColor') prefs.highlightColor = normalized;
            if (cmd === 'foreColor') prefs.fontColor = normalized;
            updateCache('textStylePrefs', prefs);
            if (typeof cachedTextStylePrefs === 'object') {
                cachedTextStylePrefs.highlightColor = prefs.highlightColor;
                cachedTextStylePrefs.fontColor = prefs.fontColor;
            }
        }

        function applyColorCommand(cmd, colorValue) {
            const normalized = normalizeColorToHex(colorValue);
            if (!normalized) return;
            markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'), 2400);
            restoreSelection();
            document.execCommand(cmd, false, normalized);
            if (lastEditableHost) persistElementContent(lastEditableHost);
            updateColorPrefs(cmd, normalized);
            setColorIndicator(cmd, normalized);
            saveSelection();
            restorePinnedEditableHostFocus();
            keepSelectionHighlighted();
            keepToolbarVisibleAfterFormatting();
        }

        function openColorPickerForCommand(cmd) {
            const picker = cmd === 'hiliteColor'
                ? toolbar.querySelector('#highlightColorPicker')
                : toolbar.querySelector('#fontColorPicker');
            const btn = toolbar.querySelector(`.color-btn[data-cmd="${cmd}"]`);
            const fallback = cmd === 'hiliteColor' ? '#fff59d' : '#d93025';
            if (!picker || !btn) return;
            picker.value = normalizeColorToHex(btn.dataset.value) || fallback;
            if (typeof picker.showPicker === 'function') {
                picker.showPicker();
            } else {
                picker.click();
            }
        }

        function bindColorPicker(pickerId, cmd) {
            const picker = toolbar.querySelector(`#${pickerId}`);
            if (!picker) return;
            const onPick = () => applyColorCommand(cmd, picker.value);
            picker.addEventListener('input', onPick);
            picker.addEventListener('change', onPick);
        }

        bindColorPicker('highlightColorPicker', 'hiliteColor');
        bindColorPicker('fontColorPicker', 'foreColor');

        toolbar.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'), 2400);
                saveSelection();
            });

            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'), 2400);
                restoreSelection();
                const cmd = btn.dataset.cmd;
                if (!cmd) return;

                if (cmd === 'hiliteColor' || cmd === 'foreColor') {
                    openColorPickerForCommand(cmd);
                    return;
                }

                document.execCommand(cmd, false, null);

                if (lastEditableHost) persistElementContent(lastEditableHost);
                saveSelection();
                restorePinnedEditableHostFocus();
                keepSelectionHighlighted();
                keepToolbarVisibleAfterFormatting();
            });
        });
        // 字体选择
        const cachedTextStylePrefs = (getCache().textStylePrefs && typeof getCache().textStylePrefs === 'object')
            ? getCache().textStylePrefs
            : {};
        setFontDropdownValue(cachedTextStylePrefs.fontFamily || 'Microsoft YaHei');
        setColorIndicator('hiliteColor', cachedTextStylePrefs.highlightColor || '#fff59d');
        setColorIndicator('foreColor', cachedTextStylePrefs.fontColor || '#d93025');

        // 字号选择
        const sizeInput = toolbar.querySelector('#fontSizeInput');
        const FONT_SIZE_MIN = 8;
        const FONT_SIZE_MAX = 72;
        let lastAppliedFontSize = null;
        if (Number.isFinite(parseInt(cachedTextStylePrefs.fontSize, 10))) {
            sizeInput.value = String(parseInt(cachedTextStylePrefs.fontSize, 10));
        }

        function parseFontSizeInputValue(rawValue, clamp = false) {
            const parsed = parseInt(rawValue, 10);
            if (!Number.isFinite(parsed)) return null;
            if (clamp) {
                return Math.min(FONT_SIZE_MAX, Math.max(FONT_SIZE_MIN, parsed));
            }
            if (parsed < FONT_SIZE_MIN || parsed > FONT_SIZE_MAX) return null;
            return parsed;
        }

        function applyFontSizeFromInput(commit = false) {
            const host = lastEditableHost || document.querySelector('[contenteditable="true"]');
            markToolbarEditingInteraction(host, 2400);
            const size = parseFontSizeInputValue(sizeInput.value, false);

            if (size === null) {
                if (commit) {
                    const fallbackSize = parseFontSizeInputValue(cachedTextStylePrefs.fontSize, true) || FONT_SIZE_MIN;
                    sizeInput.value = String(fallbackSize);
                }
                return;
            }

            if (!restoreSelectionSnapshot(fontSizeSelectionSnapshot)) {
                restoreSelection();
            }

            if (size === lastAppliedFontSize) {
                if (commit) {
                    restorePinnedEditableHostFocus();
                    keepSelectionHighlighted();
                    keepToolbarVisibleAfterFormatting();
                }
                return;
            }

            applyInlineStyleToSelection('fontSize', size + 'px');
            if (lastEditableHost) persistElementContent(lastEditableHost);
            const prefs = getCache().textStylePrefs && typeof getCache().textStylePrefs === 'object'
                ? getCache().textStylePrefs
                : {};
            prefs.fontSize = size;
            updateCache('textStylePrefs', prefs);
            cachedTextStylePrefs.fontSize = size;
            lastAppliedFontSize = size;

            saveSelection();
            fontSizeSelectionSnapshot = buildSelectionSnapshot();
            if (commit) {
                restorePinnedEditableHostFocus();
                keepSelectionHighlighted();
                keepToolbarVisibleAfterFormatting();
            } else {
                updateToolbarState();
            }
        }

        sizeInput.addEventListener('focus', () => {
            markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'), 2400);
            saveSelection();
            fontSizeSelectionSnapshot = buildSelectionSnapshot();
        });
        sizeInput.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            markToolbarEditingInteraction(lastEditableHost || document.querySelector('[contenteditable="true"]'), 2400);
            saveSelection();
            fontSizeSelectionSnapshot = buildSelectionSnapshot();
        });
        sizeInput.addEventListener('click', (e) => {
            e.stopPropagation();
        });
        sizeInput.addEventListener('keydown', (e) => {
            const allowKeys = new Set(['Tab', 'ArrowUp', 'ArrowDown', 'Home', 'End']);
            if (allowKeys.has(e.key) || e.ctrlKey || e.metaKey || e.altKey) return;
            e.preventDefault();
        });
        sizeInput.addEventListener('paste', (e) => {
            e.preventDefault();
        });
        sizeInput.addEventListener('input', () => {
            applyFontSizeFromInput(true);
        });
        sizeInput.addEventListener('change', () => {
            applyFontSizeFromInput(true);
        });
        sizeInput.addEventListener('blur', () => {
            applyFontSizeFromInput(true);
        });
        
        return toolbar;
    }
    
    // 更新工具栏按钮状态
    function updateToolbarState() {
        const toolbar = document.getElementById('floatingFormatToolbar');
        if (!toolbar) return;
        const fontFamilyMap = window.__toolbarFontFamilyMap || {};

        const fontDropdown = toolbar.querySelector('#fontFamilyDropdown');
        const fontTrigger = toolbar.querySelector('#fontFamilyTrigger');
        const fontOptions = toolbar.querySelectorAll('#fontFamilyMenu .font-option');
        const sizeInput = toolbar.querySelector('#fontSizeInput');

        function normalizeColorToHex(colorValue) {
            if (!colorValue) return null;
            const color = String(colorValue).trim().toLowerCase();
            if (!color || color === 'transparent' || color === 'inherit' || color === 'initial') return null;
            const hexMatch = color.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
            if (hexMatch) {
                const hex = hexMatch[1];
                if (hex.length === 3) return '#' + hex.split('').map((c) => c + c).join('').toLowerCase();
                return '#' + hex.toLowerCase();
            }
            const rgbMatch = color.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)$/i);
            if (!rgbMatch) return null;
            if (rgbMatch[4] !== undefined && Number(rgbMatch[4]) === 0) return null;
            const r = Math.max(0, Math.min(255, parseInt(rgbMatch[1], 10) || 0));
            const g = Math.max(0, Math.min(255, parseInt(rgbMatch[2], 10) || 0));
            const b = Math.max(0, Math.min(255, parseInt(rgbMatch[3], 10) || 0));
            const toHex = (v) => v.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function syncColorControls(targetEl) {
            const highlightBtn = toolbar.querySelector('.color-btn[data-cmd="hiliteColor"]');
            const fontBtn = toolbar.querySelector('.color-btn[data-cmd="foreColor"]');
            const prefs = getCache().textStylePrefs && typeof getCache().textStylePrefs === 'object'
                ? getCache().textStylePrefs
                : {};
            const fallbackHighlight = normalizeColorToHex((highlightBtn && highlightBtn.dataset.value) || prefs.highlightColor) || '#fff59d';
            const fallbackFont = normalizeColorToHex((fontBtn && fontBtn.dataset.value) || prefs.fontColor) || '#d93025';

            let currentHighlight = null;
            let currentFont = null;

            try { currentHighlight = normalizeColorToHex(document.queryCommandValue('hiliteColor')); } catch (err) {}
            try { currentFont = normalizeColorToHex(document.queryCommandValue('foreColor')); } catch (err) {}
            if (!currentHighlight && targetEl) currentHighlight = normalizeColorToHex(window.getComputedStyle(targetEl).backgroundColor);
            if (!currentFont && targetEl) currentFont = normalizeColorToHex(window.getComputedStyle(targetEl).color);

            const highlight = currentHighlight || fallbackHighlight;
            const font = currentFont || fallbackFont;

            const highlightIndicator = highlightBtn ? highlightBtn.querySelector('.color-indicator') : null;
            const fontIndicator = fontBtn ? fontBtn.querySelector('.color-indicator') : null;
            if (highlightIndicator) highlightIndicator.style.backgroundColor = highlight;
            if (fontIndicator) fontIndicator.style.backgroundColor = font;
            if (highlightBtn) highlightBtn.dataset.value = highlight;
            if (fontBtn) fontBtn.dataset.value = font;
        }

        function pickSelectionElement() {
            const sel = window.getSelection();
            let node = (sel && sel.rangeCount > 0) ? sel.anchorNode : null;
            const fallbackRange = window.__floatingSavedRange;
            if (!node && fallbackRange && fallbackRange.startContainer) {
                node = fallbackRange.startContainer;
            }
            if (!node) return null;
            if (node.nodeType !== Node.ELEMENT_NODE) node = node.parentElement;
            if (!node) return null;
            return node.closest('[contenteditable="true"]') ? node : null;
        }

        function normalizeFamilyName(family) {
            return (family || '').replace(/["']/g, '').split(',')[0].trim();
        }

        function syncFontControls() {
            const targetEl = pickSelectionElement();
            const isSizeInputActive = !!(sizeInput && document.activeElement === sizeInput);
            if (!targetEl) {
                if (sizeInput && !isSizeInputActive) sizeInput.value = '';
                syncColorControls(null);
                return;
            }
            const cs = window.getComputedStyle(targetEl);
            const family = normalizeFamilyName(cs.fontFamily);
            const sizePx = parseFloat(cs.fontSize || '');

            if (fontDropdown && fontTrigger && fontOptions.length) {
                if (family) {
                    const options = Array.from(fontOptions);
                    const hit = options.find((opt) => {
                        const val = opt.getAttribute('data-value') || '';
                        const mapped = (fontFamilyMap[val] || '').toLowerCase();
                        return val === family || mapped.includes(family.toLowerCase());
                    });
                    if (hit) {
                        fontTrigger.textContent = hit.textContent || '';
                        fontDropdown.dataset.value = hit.getAttribute('data-value') || '';
                        options.forEach((opt) => opt.classList.toggle('active', opt === hit));
                    }
                }
            }

            if (isSizeInputActive) {
                // 用户正在输入字号时，不要用当前选区字号回填覆盖输入值。
            } else if (sizeInput && Number.isFinite(sizePx)) {
                sizeInput.value = String(Math.round(sizePx));
            } else if (sizeInput) {
                sizeInput.value = '';
            }

            syncColorControls(targetEl);
        }

        toolbar.querySelectorAll('.format-btn').forEach(btn => {
            const cmd = btn.dataset.cmd;
            if (cmd && document.queryCommandState(cmd)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        syncFontControls();
    }
    
    // 显示/隐藏浮动工具栏
    function toggleFloatingToolbar() {
        const toolbar = document.getElementById('floatingFormatToolbar');
        if (!toolbar) return;

        const getEditableHost = (node) => {
            const el = node && (node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement);
            return el ? el.closest('[contenteditable="true"]') : null;
        };

        const activeEl = document.activeElement;
        const isToolbarActive = !!(activeEl && toolbar.contains(activeEl));

        const selection = window.getSelection();
        const hasRawSelection = !!(selection && selection.rangeCount > 0 && !selection.isCollapsed && selection.toString().trim() !== '');
        const anchorHost = hasRawSelection ? getEditableHost(selection.anchorNode) : null;
        const focusHost = hasRawSelection ? getEditableHost(selection.focusNode) : null;
        const editingHost = anchorHost && focusHost && anchorHost === focusHost ? anchorHost : null;
        const hasSelection = !!editingHost;

        // 工具栏控件交互期（如字体下拉展开）保持可见，避免闪退
        if (isToolbarActive) {
            toolbar.classList.add('visible');
            updateToolbarState();
            return;
        }

        if (!hasSelection) {
            toolbar.classList.remove('visible');
            return;
        }

        if (toolbar.dataset.userMoved !== '1') {
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();

            toolbar.style.left = rect.left + (rect.width / 2) - (toolbar.offsetWidth / 2) + 'px';
            toolbar.style.top = rect.top - toolbar.offsetHeight - 8 + 'px';

            const toolbarRect = toolbar.getBoundingClientRect();
            if (toolbarRect.left < 10) {
                toolbar.style.left = '10px';
            }
            if (toolbarRect.right > window.innerWidth - 10) {
                toolbar.style.left = (window.innerWidth - toolbar.offsetWidth - 10) + 'px';
            }
            if (toolbarRect.top < 10) {
                toolbar.style.top = rect.bottom + 8 + 'px';
            }
        }

        toolbar.classList.add('visible');
        updateToolbarState();
    }
    
    // 初始化浮动工具栏
    createFloatingToolbar();
    
    // 监听选区变化
    document.addEventListener('selectionchange', toggleFloatingToolbar);
    document.addEventListener('mouseup', () => {
        setTimeout(toggleFloatingToolbar, 0);
    });
    document.addEventListener('keyup', toggleFloatingToolbar);
    document.addEventListener('focusout', () => {
        setTimeout(toggleFloatingToolbar, 0);
    }, true);

    init();
    
    // 页面加载完成后初始化一次按钮状态
    window.addEventListener('load', updateTextFormatButtons);
</script>
</body>
