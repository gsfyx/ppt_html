    function runElementAnimation(element, config, extraDelayMs = 0) {
        const frames = buildElementAnimationKeyframes(config.type);
        if (!frames) return Promise.resolve();
        const animatedStyleKeys = Array.from(new Set(frames.flatMap((frame) => Object.keys(frame))));
        const originalInlineStyles = {};
        animatedStyleKeys.forEach((key) => {
            originalInlineStyles[key] = element.style[key] || '';
        });
        const timing = {
            duration: config.durationMs,
            delay: Math.max(0, config.delayMs + extraDelayMs),
            easing: 'ease-out',
            fill: 'none'
        };
        const animation = element.animate(frames, timing);
        return animation.finished
            .catch(() => {})
            .finally(() => {
                animatedStyleKeys.forEach((key) => {
                    element.style[key] = originalInlineStyles[key];
                });
            });
    }

    function playElementAnimationsForActiveSlide() {
        const slide = document.querySelector('#slidesContainer .slide.active');
        if (!slide) return;
        pendingClickElementAnimations = [];

        const tasks = collectElementAnimationTasks(slide);
        if (!tasks.length) return;

        let serial = Promise.resolve();
        tasks.forEach((task) => {
            if (task.cfg.start === 'on-click') {
                pendingClickElementAnimations.push(() => runElementAnimation(task.el, task.cfg));
                return;
            }
            if (task.cfg.start === 'after-previous') {
                serial = serial.then(() => runElementAnimation(task.el, task.cfg));
                return;
            }
            runElementAnimation(task.el, task.cfg);
        });
    }

    function initElementAnimationControls() {
        document.querySelectorAll('.toolbar-panel[data-panel="animation"] .panel-btn[data-element-animation]').forEach((btn) => {
            if (btn.dataset.bound === 'true') return;
            btn.dataset.bound = 'true';
            btn.addEventListener('click', () => {
                if (btn.classList.contains('disabled')) return;
                applyAnimationTypeToSelection(btn.getAttribute('data-element-animation') || 'none');
            });
        });

        document.querySelectorAll('#elementAnimStartBtn').forEach((btn) => {
            if (btn.dataset.bound === 'true') return;
            btn.dataset.bound = 'true';
            btn.addEventListener('click', () => {
                if (btn.classList.contains('disabled')) return;
                cycleElementAnimationStartMode();
            });
        });

        const allowKeys = new Set(['Tab', 'ArrowUp', 'ArrowDown', 'Home', 'End']);
        document.querySelectorAll('#elementAnimDurationInput').forEach((input) => {
            if (input.dataset.bound === 'true') return;
            input.dataset.bound = 'true';
            input.addEventListener('keydown', (ev) => {
                if (allowKeys.has(ev.key) || ev.ctrlKey || ev.metaKey || ev.altKey) return;
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    input.blur();
                    return;
                }
                ev.preventDefault();
            });
            input.addEventListener('paste', (ev) => ev.preventDefault());
            input.addEventListener('change', () => updateElementAnimationTimingFromInput('duration', input.value));
        });

        document.querySelectorAll('#elementAnimDelayInput').forEach((input) => {
            if (input.dataset.bound === 'true') return;
            input.dataset.bound = 'true';
            input.addEventListener('keydown', (ev) => {
                if (allowKeys.has(ev.key) || ev.ctrlKey || ev.metaKey || ev.altKey) return;
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    input.blur();
                    return;
                }
                ev.preventDefault();
            });
            input.addEventListener('paste', (ev) => ev.preventDefault());
            input.addEventListener('change', () => updateElementAnimationTimingFromInput('delay', input.value));
        });

        const slidesContainer = document.getElementById('slidesContainer');
        if (slidesContainer && slidesContainer.dataset.animClickBound !== 'true') {
            slidesContainer.dataset.animClickBound = 'true';
            slidesContainer.addEventListener('click', (ev) => {
                if (!pendingClickElementAnimations.length) return;
                if (ev.target && (ev.target.closest('.draggable') || ev.target.closest('.ppt-toolbar') || ev.target.closest('.toolbar-panels'))) return;
                const next = pendingClickElementAnimations.shift();
                if (typeof next === 'function') next();
            });
        }

        refreshElementAnimationPanel();
    }

    function toggleAutoSlideEnabled() {
        const nextEnabled = !isAutoSlideEnabled();
        updateCache('autoSlideEnabled', nextEnabled, { reason: 'auto-slide-toggle' });
        refreshTransitionTimingButtons();
        if (nextEnabled) {
            restartAutoSlideTimer();
        } else {
            stopAutoSlideTimer();
        }
    }

    function normalizeSlideTransition(value) {
        return SLIDE_TRANSITION_SET.has(value) ? value : DEFAULT_SLIDE_TRANSITION;
    }

    function getSlideTransitionAt(idx) {
        const slide = slidesData[idx];
        return normalizeSlideTransition(slide && slide.transition);
    }

    function refreshTransitionPanelButtons() {
        const selected = getSlideTransitionAt(currentIdx);
        document.querySelectorAll('.toolbar-panel[data-panel="transition"] .panel-btn[data-transition]').forEach((btn) => {
            btn.classList.toggle('active', normalizeSlideTransition(btn.dataset.transition) === selected);
        });
    }

    function setCurrentSlideTransition(transition) {
        if (!slidesData[currentIdx]) return;
        const normalized = normalizeSlideTransition(transition);
        slidesData[currentIdx].transition = normalized;
        updateCache('slidesData', slidesData, { reason: 'slide-transition' });
        refreshTransitionPanelButtons();
    }

    function buildTransitionKeyframes(transition, entering, direction) {
        switch (transition) {
            case 'fade':
                return entering
                    ? [{ opacity: 0 }, { opacity: 1 }]
                    : [{ transform: 'translateY(0)', opacity: 1 }, { transform: 'translateY(-4px)', opacity: 0 }];
            case 'push': {
                const offset = direction >= 0 ? 18 : -18;
                return entering
                    ? [{ transform: `translateX(${offset}%)`, opacity: 1 }, { transform: 'translateX(0)', opacity: 1 }]
                    : [{ transform: 'translateX(0)', opacity: 1 }, { transform: `translateX(${-offset}%)`, opacity: 1 }];
            }
            case 'wipe': {
                const startClip = direction >= 0 ? 'inset(0 100% 0 0)' : 'inset(0 0 0 100%)';
                const endClip = 'inset(0 0 0 0)';
                return entering
                    ? [{ clipPath: startClip, opacity: 1 }, { clipPath: endClip, opacity: 1 }]
                    : [{ clipPath: endClip, opacity: 1 }, { clipPath: startClip, opacity: 1 }];
            }
            case 'cover': {
                const offset = direction >= 0 ? 100 : -100;
                return entering
                    ? [{ transform: `translateX(${offset}%)`, opacity: 1 }, { transform: 'translateX(0)', opacity: 1 }]
                    : [{ transform: 'translateX(0)', opacity: 1 }, { transform: 'translateX(0)', opacity: 1 }];
            }
            case 'uncover': {
                const offset = direction >= 0 ? -100 : 100;
                return entering
                    ? [{ transform: 'translateX(0)', opacity: 1 }, { transform: 'translateX(0)', opacity: 1 }]
                    : [{ transform: 'translateX(0)', opacity: 1 }, { transform: `translateX(${offset}%)`, opacity: 1 }];
            }
            case 'zoom':
                return entering
                    ? [{ transform: 'scale(0.9)', opacity: 0.3 }, { transform: 'scale(1)', opacity: 1 }]
                    : [{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(1.08)', opacity: 0 }];
            case 'split':
                return entering
                    ? [{ clipPath: 'inset(0 50% 0 50%)', opacity: 0.4 }, { clipPath: 'inset(0 0 0 0)', opacity: 1 }]
                    : [{ clipPath: 'inset(0 0 0 0)', opacity: 1 }, { clipPath: 'inset(0 50% 0 50%)', opacity: 0.3 }];
            case 'reveal':
                return entering
                    ? [{ transform: 'scale(0.96)', opacity: 0.35 }, { transform: 'scale(1)', opacity: 1 }]
                    : [{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(1.02)', opacity: 0 }];
            default:
                return null;
        }
    }

    function goToSlide(targetIdx, directionHint = null) {
        if (isSlideTransitioning) return;
        if (!Number.isFinite(targetIdx)) return;
        const slides = document.querySelectorAll('.slide');
        const maxIdx = slides.length - 1;
        const normalizedTarget = Math.max(0, Math.min(targetIdx, maxIdx));
        if (normalizedTarget === currentIdx) {
            updateSlidesAndThumbnails();
            playElementAnimationsForActiveSlide();
            return;
        }

        const fromIdx = currentIdx;
        const toIdx = normalizedTarget;
        const fromSlide = slides[fromIdx];
        const toSlide = slides[toIdx];
        if (!fromSlide || !toSlide) return;

        const direction = directionHint === null ? (toIdx > fromIdx ? 1 : -1) : (directionHint >= 0 ? 1 : -1);
        const transition = getSlideTransitionAt(toIdx);
        const enterFrames = buildTransitionKeyframes(transition, true, direction);
        const exitFrames = buildTransitionKeyframes(transition, false, direction);

        if (!enterFrames || !exitFrames) {
            currentIdx = toIdx;
            updateSlidesAndThumbnails();
            playElementAnimationsForActiveSlide();
            restartAutoSlideTimer();
            return;
        }

        isSlideTransitioning = true;
        toSlide.classList.add('active');
        toSlide.style.zIndex = '12';
        fromSlide.style.zIndex = '11';

        // 清理残留动画，避免上一次 fill 效果叠加造成位置偏移。
        [fromSlide, toSlide].forEach((slideEl) => {
            slideEl.getAnimations().forEach((anim) => anim.cancel());
        });

        const timing = { duration: getTransitionDurationMs(), easing: 'ease-in-out', fill: 'none' };
        const enterAnim = toSlide.animate(enterFrames, timing);
        const exitAnim = fromSlide.animate(exitFrames, timing);

        Promise.allSettled([enterAnim.finished, exitAnim.finished]).finally(() => {
            enterAnim.cancel();
            exitAnim.cancel();
            [fromSlide, toSlide].forEach((slideEl) => {
                slideEl.style.transform = '';
                slideEl.style.clipPath = '';
                slideEl.style.opacity = '';
            });
            toSlide.style.zIndex = '';
            fromSlide.style.zIndex = '';
            currentIdx = toIdx;
            updateSlidesAndThumbnails();
            playElementAnimationsForActiveSlide();
            isSlideTransitioning = false;
            restartAutoSlideTimer();
        });
    }

    function updateSlidesAndThumbnails() {
        clearSelectedElement();
        const slides = document.querySelectorAll('.slide');
        totalSlides = slides.length;
        slides.forEach((slide, idx) => {
            if (idx === currentIdx) slide.classList.add('active');
            else slide.classList.remove('active');
        });

        // 更新缩略图高亮
        const thumbnails = document.querySelectorAll('.thumbnail-item');
        thumbnails.forEach((thumb, idx) => {
            if (idx === currentIdx) thumb.classList.add('active');
            else thumb.classList.remove('active');
        });

        // 滚动到当前缩略图
        const activeThumb = document.querySelector('.thumbnail-item.active');
        if (activeThumb) {
            activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.getElementById('pageIndex').innerText = (currentIdx + 1) + ' / ' + totalSlides;
        refreshTransitionPanelButtons();
        refreshElementAnimationPanel();

        // 延迟重新启用编辑和拖拽功能，确保当前幻灯片的元素可以交互
        setTimeout(() => {
            enableDoubleClickEdit();
            enableDraggableElements();
            scheduleCurrentThumbnailRefresh(currentIdx);
        }, 50);
    }

    function nextSlide() { if (currentIdx < totalSlides - 1) goToSlide(currentIdx + 1, 1); }
    function prevSlide() { if (currentIdx > 0) goToSlide(currentIdx - 1, -1); }

    function renderThumbnailContent(thumb, slide, idx) {
        thumb.innerHTML = '';
        const slideContent = slide.querySelector('.content-wrapper');
        if (slideContent) {
            const clonedContent = slideContent.cloneNode(true);
            // 缩略图是纯预览，移除所有 id，避免与主画布元素发生缓存/选择器冲突
            clonedContent.removeAttribute('id');
            clonedContent.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
            clonedContent.style.transform = 'scale(0.2)';
            clonedContent.style.transformOrigin = 'top left';
            clonedContent.style.width = '500%';
            clonedContent.style.minHeight = '500%';
            clonedContent.style.position = 'absolute';
            clonedContent.style.top = '0';
            clonedContent.style.left = '0';
            clonedContent.style.pointerEvents = 'none';

            clonedContent.querySelectorAll('[contenteditable]').forEach(el => {
                el.removeAttribute('contenteditable');
            });
            clonedContent.querySelectorAll('.draggable').forEach(el => {
                el.style.cursor = 'default';
                el.classList.remove('draggable');
            });

            const previewContainer = document.createElement('div');
            previewContainer.className = 'thumbnail-content-preview';
            previewContainer.style.width = '100%';
            previewContainer.style.height = '100%';
            previewContainer.style.overflow = 'hidden';
            previewContainer.style.position = 'relative';
            previewContainer.style.background = 'var(--card-bg, #fff)';
            previewContainer.appendChild(clonedContent);
            thumb.appendChild(previewContainer);
        } else {
            const data = slidesData[idx];
            const title = data?.title?.replace(/<br>/g, ' ') || (data?.type === 'blank' ? '新幻灯片' : `幻灯片 ${idx + 1}`);
            thumb.innerHTML = `<div class="thumbnail-fallback">${title}</div>`;
        }

        // 缩略图重绘后必须恢复操作按钮（复制/删除）
        const actions = document.createElement('div');
        actions.className = 'thumbnail-actions';
        actions.innerHTML = `
            <div class="thumbnail-action-btn" title="复制幻灯片" data-action="copy" data-index="${idx}">
                <i class="fas fa-copy"></i>
            </div>
            <div class="thumbnail-action-btn delete" title="删除幻灯片" data-action="delete" data-index="${idx}">
                <i class="fas fa-trash-alt"></i>
            </div>
        `;
        thumb.appendChild(actions);
        hydrateOfflineIcons(actions);
    }

    let thumbnailSyncTimer = null;
    function refreshThumbnailForSlide(idx) {
        const slides = document.querySelectorAll('.slide');
        const thumb = document.querySelector(`.thumbnail-item[data-index="${idx + 1}"]`);
        if (!slides[idx] || !thumb) return;
        renderThumbnailContent(thumb, slides[idx], idx);
    }

    function scheduleCurrentThumbnailRefresh(targetIdx = currentIdx) {
        if (thumbnailSyncTimer) clearTimeout(thumbnailSyncTimer);
        const stableIdx = targetIdx;
        thumbnailSyncTimer = setTimeout(() => {
            refreshThumbnailForSlide(stableIdx);
            thumbnailSyncTimer = null;
        }, 60);
    }

    // 生成缩略图目录
    function generateThumbnails() {
        const container = document.getElementById('thumbnailList');
        container.innerHTML = '';

        // 等待幻灯片渲染完成
        setTimeout(() => {
            const slides = document.querySelectorAll('.slide');
            applyDeletedElementsToAllSlides(getCache());

            slides.forEach((slide, idx) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumbnail-item';
                thumb.setAttribute('data-index', idx + 1);
                renderThumbnailContent(thumb, slide, idx);

                thumb.addEventListener('click', (e) => {
                    // 如果点击的是操作按钮，不触发切换
                    if (e.target.closest('.thumbnail-action-btn')) return;
                    goToSlide(idx, idx >= currentIdx ? 1 : -1);
                });

                container.appendChild(thumb);
            });

            if (!container._thumbActionsBound) {
                container.addEventListener('click', (e) => {
                    const btn = e.target.closest('.thumbnail-action-btn');
                    if (!btn) return;
                    e.stopPropagation();
                    const action = btn.getAttribute('data-action');
                    const idx = parseInt(btn.getAttribute('data-index'), 10);
                    if (Number.isNaN(idx)) return;
                    if (action === 'copy') copySlide(idx);
                    else if (action === 'delete') deleteSlide(idx);
                });
                container._thumbActionsBound = true;
            }

            updateSlidesAndThumbnails();
        }, 100);
    }

    // 复制幻灯片
    function copySlide(idx) {
        const slideData = JSON.parse(JSON.stringify(slidesData[idx]));
        slidesData.splice(idx + 1, 0, slideData);
        renderSlides();
        generateThumbnails();
        const slides = document.querySelectorAll('.slide');
        totalSlides = slides.length;
        currentIdx = idx + 1;
        updateSlidesAndThumbnails();
        enableDoubleClickEdit();
        enableDraggableElements();
        updateCache('slidesData', slidesData);
    }

    // 删除幻灯片
    function deleteSlide(idx) {
        if (slidesData.length <= 1) {
            alert('不能删除最后一个幻灯片！');

        slidesData.splice(idx, 1);
        renderSlides();
        generateThumbnails();
        const slides = document.querySelectorAll('.slide');
        totalSlides = slides.length;
        if (currentIdx >= slides.length) currentIdx = slides.length - 1;
        if (currentIdx < 0) currentIdx = 0;
        updateSlidesAndThumbnails();
        enableDoubleClickEdit();
        enableDraggableElements();
        updateCache('slidesData', slidesData);

    function isTypingContextActive() {
        const ae = document.activeElement;
        if (!ae) return false;
        if (ae.isContentEditable || ae.getAttribute('contenteditable') === 'true') return true;
        const tag = (ae.tagName || '').toUpperCase();
        return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

    let toolbarEditLockUntil = 0;

    function markToolbarEditingInteraction(host, ms = 1200) {
        toolbarEditLockUntil = Date.now() + ms;
        if (host && host.isConnected) toolbarPinnedEditableHost = host;
    }

    function isToolbarEditingInteractionActive() {
        return Date.now() < toolbarEditLockUntil;
    }

    function restorePinnedEditableHostFocus() {
        const host = toolbarPinnedEditableHost;
        if (!host || !host.isConnected) return;
        host.setAttribute('contenteditable', 'true');
        host.focus({ preventScroll: true });

    function deferBlurWhenToolbarActive(targetEl) {
        if (activeConfirmDialog && activeConfirmDialog.isConnected) return false;
        const toolbar = document.getElementById('floatingFormatToolbar');
        const activeEl = document.activeElement;
        const byFocus = !!(toolbar && activeEl && toolbar.contains(activeEl));
        const byLock = isToolbarEditingInteractionActive();
        if (!byFocus && !byLock) return false;
        setTimeout(() => {
            if (activeConfirmDialog && activeConfirmDialog.isConnected) return;
            const nextTarget = (targetEl && targetEl.isConnected) ? targetEl : toolbarPinnedEditableHost;
            if (!nextTarget || !nextTarget.isConnected) return;
            nextTarget.setAttribute('contenteditable', 'true');
            nextTarget.focus({ preventScroll: true });
        }, 0);
        return true;

        if (!activeEl || !(activeEl instanceof HTMLElement)) return;
        if (activeConfirmDialog && activeConfirmDialog.contains(activeEl)) return;
        if (activeEl.isContentEditable || ['INPUT', 'TEXTAREA', 'SELECT'].includes(activeEl.tagName)) {

    function escapeHtmlText(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function escapeHtmlAttr(value) {
        return escapeHtmlText(value).replace(/"/g, '&quot;');
    }

    function showManagedFormDialog(options) {
        if (activeConfirmDialog) return Promise.resolve({ action: 'cancel' });
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'custom-confirm-overlay';
            overlay.innerHTML = `
                <div class="custom-confirm-dialog" role="dialog" aria-modal="true" aria-label="${escapeHtmlAttr(options?.ariaLabel || options?.title || '表单')}">
                    <div class="custom-confirm-title">${escapeHtmlText(options?.title || '')}</div>
                    ${options?.description ? `<div class="custom-confirm-text form-dialog-description">${escapeHtmlText(options.description)}</div>` : ''}
                    <div class="form-dialog-body">
                        ${options?.bodyHtml || ''}
                    </div>
                    <div class="custom-confirm-actions form-dialog-actions-split">
                        <button type="button" class="custom-confirm-btn" data-action="clear">${escapeHtmlText(options?.clearText || '清除')}</button>
                        <div class="form-dialog-actions-right">
                            <button type="button" class="custom-confirm-btn" data-action="cancel">${escapeHtmlText(options?.cancelText || '取消')}</button>
                            <button type="button" class="custom-confirm-btn primary" data-action="ok">${escapeHtmlText(options?.okText || '保存')}</button>
                        </div>
                    </div>
                </div>
            `;

            const dialog = overlay.querySelector('.custom-confirm-dialog');
            const focusSelector = options?.initialFocusSelector || 'input, textarea, select, button';

            const readPayload = () => {
                if (typeof options?.readPayload === 'function') {
                    return options.readPayload(overlay) || {};
                }
                return {};
            };

            const finalize = (result) => {
                if (!overlay.isConnected) return;
                document.removeEventListener('keydown', onKeydown, true);
                document.removeEventListener('focusin', onFocusIn, true);
                overlay.remove();
                activeConfirmDialog = null;
                resolve(result);
            };

            const keepFocusInside = () => {
                if (!dialog || !dialog.isConnected) return;
                const target = dialog.querySelector(focusSelector) || dialog.querySelector('button');
                if (target && typeof target.focus === 'function') {
                    target.focus({ preventScroll: true });
                }
            };

            const onFocusIn = (ev) => {
                if (!activeConfirmDialog || !activeConfirmDialog.isConnected) return;
                if (overlay.contains(ev.target)) return;
                ev.stopPropagation();
                keepFocusInside();
            };

            const onKeydown = (ev) => {
                if (!overlay.isConnected) return;
                if (!overlay.contains(ev.target)) {
                    ev.preventDefault();
                    keepFocusInside();
                    return;
                }
                if (ev.key === 'Escape') {
                    ev.preventDefault();
                    finalize({ action: 'cancel' });
                    return;
                }
                const inTextArea = ev.target instanceof HTMLElement && ev.target.tagName === 'TEXTAREA';
                if (ev.key === 'Enter' && (ev.ctrlKey || (!inTextArea && !ev.shiftKey))) {
                    ev.preventDefault();
                    finalize({ action: 'save', ...readPayload() });
                }
            };

            overlay.querySelector('[data-action="cancel"]').addEventListener('click', () => finalize({ action: 'cancel' }));
            overlay.querySelector('[data-action="clear"]').addEventListener('click', () => finalize({ action: 'clear' }));
            overlay.querySelector('[data-action="ok"]').addEventListener('click', () => {
                finalize({ action: 'save', ...readPayload() });
            });

            overlay.addEventListener('mousedown', (ev) => {
                if (dialog && ev.target instanceof Node && dialog.contains(ev.target)) return;
                ev.preventDefault();
                finalize({ action: 'cancel' });
            }, true);

            activeConfirmDialog = overlay;
            document.body.appendChild(overlay);
            document.addEventListener('keydown', onKeydown, true);
            document.addEventListener('focusin', onFocusIn, true);
            setTimeout(keepFocusInside, 0);
        });
    }

    function deleteCurrentSelectedElements() {
        if (!selectedElements.size) return false;
        const activeSlide = document.querySelector('#slidesContainer .slide.active');
        if (!activeSlide) return false;

        const targets = Array.from(selectedElements).filter((el) => {
            if (!el || !el.isConnected) return false;
            if (!activeSlide.contains(el)) return false;
            if (isLockedContainer(el)) return false;
            return true;
        });
        if (!targets.length) return false;

        const cache = getCache();
        cache.positions = cache.positions || {};
        cache.sizes = cache.sizes || {};
        cache.elementContent = cache.elementContent || {};
        cache.elementLinks = cache.elementLinks || {};
        cache.elementAnimations = cache.elementAnimations || {};
        cache.deletedElementsById = cache.deletedElementsById || {};

        targets.forEach((el) => {
            if (el._placeholder && el._placeholder.parentElement) {
                el._placeholder.parentElement.removeChild(el._placeholder);
            }
            if (el.id) {
                delete cache.positions[el.id];
                delete cache.sizes[el.id];
                delete cache.elementContent[el.id];
                delete cache.elementLinks[el.id];
                delete cache.elementAnimations[el.id];
                cache.deletedElementsById[el.id] = true;
            }

            const slideIndexForAnim = Array.from(document.querySelectorAll('.slide')).indexOf(activeSlide);
            if (el.id && slideIndexForAnim >= 0 && slidesData[slideIndexForAnim] && slidesData[slideIndexForAnim].elementAnimations) {
                delete slidesData[slideIndexForAnim].elementAnimations[el.id];
            }

            // 如果是动态元素（表格/粘贴元素），也需要从 slidesData 中移除（含子元素级联）
            const removedDynamicIds = new Set();
            const dynamicId = el.dataset.dynamicId || el.id;
            if (dynamicId) removedDynamicIds.add(dynamicId);
            el.querySelectorAll('[data-dynamic-id]').forEach((child) => {
                if (child.dataset.dynamicId) removedDynamicIds.add(child.dataset.dynamicId);
            });
            if (removedDynamicIds.size > 0) {
                const activeSlide = document.querySelector('#slidesContainer .slide.active');
                if (activeSlide) {
                    const slideIndex = Array.from(document.querySelectorAll('.slide')).indexOf(activeSlide);
                    if (slideIndex !== -1 && slidesData[slideIndex].dynamicElements) {
                        let hasChange = true;
                        let nextList = slidesData[slideIndex].dynamicElements;
                        while (hasChange) {
                            hasChange = false;
                            nextList = nextList.filter((dynamicEl) => {
                                if (!dynamicEl) return false;
                                if (removedDynamicIds.has(dynamicEl.id)) {
                                    hasChange = true;
                                    return false;
                                }
                                if (dynamicEl.parentDynamicId && removedDynamicIds.has(dynamicEl.parentDynamicId)) {
                                    removedDynamicIds.add(dynamicEl.id);
                                    hasChange = true;
                                    return false;
                                }
                                return true;
                            });
                        }
                        slidesData[slideIndex].dynamicElements = nextList;
                    }
                }
            }
            
            if (el.parentElement) el.parentElement.removeChild(el);
        });

        setCache(cache);
        
        // 更新slidesData缓存
        updateCache('slidesData', slidesData);
        
        clearSelectedElement();
        scheduleCurrentThumbnailRefresh();
        return true;
    }

    function showCustomConfirmDialog(options) {
        if (activeConfirmDialog) return Promise.resolve(false);
        const title = options?.title || '确认操作';
        const message = options?.message || '确定执行当前操作吗？';
        const okText = options?.okText || '确定';
        const cancelText = options?.cancelText || '取消';
        const danger = options?.danger !== false;
        const showCancel = options?.showCancel !== false;
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'custom-confirm-overlay';
            overlay.innerHTML = `
                <div class="custom-confirm-dialog" role="dialog" aria-modal="true" aria-label="${title}">
                    <div class="custom-confirm-title">${title}</div>
                    <div class="custom-confirm-text">${message}</div>
                    <div class="custom-confirm-actions">
                        ${showCancel ? `<button type="button" class="custom-confirm-btn" data-action="cancel">${cancelText}</button>` : ''}
                        <button type="button" class="custom-confirm-btn ${danger ? 'primary' : ''}" data-action="ok">${okText}</button>
                    </div>
                </div>
            `;

            const finalize = (ok) => {
                if (!overlay.isConnected) return;
                document.removeEventListener('keydown', onKeydown, true);
                overlay.remove();
                activeConfirmDialog = null;
                resolve(ok);
            };

            const onKeydown = (ev) => {
                if (ev.key === 'Escape') {
                    ev.preventDefault();
                    finalize(!showCancel);
                } else if (ev.key === 'Enter') {
                    ev.preventDefault();
                    finalize(true);
                }
            };

            const dialog = overlay.querySelector('.custom-confirm-dialog');
            const cancelBtn = overlay.querySelector('button[data-action="cancel"]');
            const okBtn = overlay.querySelector('button[data-action="ok"]');

            if (cancelBtn) {
                cancelBtn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    finalize(false);
                });
            }
            if (okBtn) {
                okBtn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    finalize(true);
                });
            }

            overlay.addEventListener('click', (ev) => {
                const targetNode = ev.target;
                if (dialog && targetNode instanceof Node && dialog.contains(targetNode)) return;
                finalize(!showCancel);
            });

            activeConfirmDialog = overlay;
            document.body.appendChild(overlay);
            document.addEventListener('keydown', onKeydown, true);
            if (okBtn) okBtn.focus();
        });
    }

    function showDeleteConfirmDialog(selectedCount) {
        return showCustomConfirmDialog({
            title: '确认删除',
            message: `当前选中了 ${selectedCount} 个元素，确定删除吗？此操作无法撤销。`,
            okText: '删除',
            cancelText: '取消',
            danger: true
        });
    }

    function setSelectedElement(el) {
        if (!el || isLockedContainer(el)) return;
        const boundary = resolveDragBoundary(el);
        if (!boundary) return;
        if (selectedElement === el && selectedElements.size === 1) return;
        clearSelectedElement();
        selectedElement = el;
        selectedElements.add(el);
        selectionBoundaryElement = boundary;
        selectedElement.classList.add('is-selected');
        refreshElementAnimationPanel();
    }

    function toggleSelectedElement(el) {
        if (!el || isLockedContainer(el)) return;
        const boundary = resolveDragBoundary(el);
        if (!boundary) return;
        // 多选不允许跨容器
        if (selectionBoundaryElement && selectionBoundaryElement !== boundary) return;

        if (selectedElements.has(el)) {
            selectedElements.delete(el);
            el.classList.remove('is-selected');
            if (selectedElement === el) {
                selectedElement = selectedElements.size ? Array.from(selectedElements)[selectedElements.size - 1] : null;
            }
            if (selectedElements.size === 0) {
                selectionBoundaryElement = null;
            }
            refreshElementAnimationPanel();
            return;
        }

        if (!selectionBoundaryElement) selectionBoundaryElement = boundary;
        selectedElements.add(el);
        selectedElement = el;
        el.classList.add('is-selected');
        refreshElementAnimationPanel();
    }

    function clearMarqueePreview() {
        marqueeState.previewed.forEach((el) => {
            if (!selectedElements.has(el)) el.classList.remove('is-selected');
        });
        marqueeState.previewed.clear();
    }

    function resetMarqueeState() {
        clearMarqueePreview();
        if (marqueeState.box && marqueeState.box.parentElement) {
            marqueeState.box.parentElement.removeChild(marqueeState.box);
        }
        marqueeState.active = false;
        marqueeState.slide = null;
        marqueeState.slideRect = null;
        marqueeState.box = null;
        marqueeState.currentHits.clear();
        marqueeState.isAdditive = false;
    }

    function beginMarqueeSelection(e, slide, isAdditive) {
        resetMarqueeState();
        marqueeState.active = true;
        marqueeState.slide = slide;
        marqueeState.slideRect = slide.getBoundingClientRect();
        marqueeState.startClientX = e.clientX;
        marqueeState.startClientY = e.clientY;
        marqueeState.isAdditive = !!isAdditive;

        if (getComputedStyle(slide).position === 'static') {
            slide.style.position = 'relative';
        }

        const box = document.createElement('div');
        box.className = 'selection-marquee';
        slide.appendChild(box);
        marqueeState.box = box;
    }

    function updateMarqueeSelection(clientX, clientY) {
        if (!marqueeState.active || !marqueeState.slideRect || !marqueeState.box) return;
        const r = marqueeState.slideRect;
        const cx = Math.max(r.left, Math.min(clientX, r.right));
        const cy = Math.max(r.top, Math.min(clientY, r.bottom));
        const x1 = Math.min(marqueeState.startClientX, cx);
        const y1 = Math.min(marqueeState.startClientY, cy);
        const x2 = Math.max(marqueeState.startClientX, cx);
        const y2 = Math.max(marqueeState.startClientY, cy);

        marqueeState.box.style.display = 'block';
        marqueeState.box.style.left = `${x1 - r.left}px`;
        marqueeState.box.style.top = `${y1 - r.top}px`;
        marqueeState.box.style.width = `${Math.max(1, x2 - x1)}px`;
        marqueeState.box.style.height = `${Math.max(1, y2 - y1)}px`;

        const hits = new Set();
        let anchorBoundary = marqueeState.isAdditive ? selectionBoundaryElement : null;
        const candidates = marqueeState.slide.querySelectorAll('.draggable');
        candidates.forEach((el) => {
            if (isLockedContainer(el)) return;
            if (el.getAttribute('contenteditable') === 'true' || el.closest('[contenteditable="true"]')) return;
            const rect = el.getBoundingClientRect();
            const intersects = rect.right >= x1 && rect.left <= x2 && rect.bottom >= y1 && rect.top <= y2;
            if (!intersects) return;
            const boundary = resolveDragBoundary(el);
            if (!boundary) return;
            if (!anchorBoundary) anchorBoundary = boundary;
            if (boundary !== anchorBoundary) return;
            hits.add(el);
        });

        clearMarqueePreview();
        hits.forEach((el) => {
            if (!selectedElements.has(el)) {
                marqueeState.previewed.add(el);
                el.classList.add('is-selected');
            }
        });
        marqueeState.currentHits = hits;
    }

    function finalizeMarqueeSelection() {
        if (!marqueeState.active) return false;
        const hits = Array.from(marqueeState.currentHits);

        if (!marqueeState.isAdditive) {
            clearSelectedElement();
            hits.forEach((el) => {
                selectedElements.add(el);
                el.classList.add('is-selected');
                selectedElement = el;
                if (!selectionBoundaryElement) selectionBoundaryElement = resolveDragBoundary(el);
            });
        } else {
            hits.forEach((el) => {
                const boundary = resolveDragBoundary(el);
                if (!boundary) return;
                if (selectionBoundaryElement && selectionBoundaryElement !== boundary) return;
                if (!selectionBoundaryElement) selectionBoundaryElement = boundary;
                if (!selectedElements.has(el)) {
                    selectedElements.add(el);
                    el.classList.add('is-selected');
                }
                selectedElement = el;
            });
        }

        resetMarqueeState();
        return true;
    }

    const dragBoundarySelectors = [
        '.content-wrapper', '.hero-wrapper', '.feature-card', '.stat-block', '.col', '.path-item',
        '.quote', '.achievement-extra', '.path-extra', '.two-columns-extra', '.blank-content'
    ];
    const draggableSelectors = [
        'h1', 'h2', 'h3', 'h4',
        '.badge', '.feature-card', '.stat-block', '.col', '.path-item', '.quote',
        '.achievement-extra', '.path-extra', '.two-columns-extra',
        '.table-widget', '.image-widget', '.icon-widget', '.shape-widget', '.textbox-widget',
        'footer',
        '.content-wrapper > p', '.hero-wrapper p',
        '.insight-list li',
        '.achievement-extra strong', '.achievement-extra span',
        '.path-extra span', '.two-columns-extra strong',
        '.feature-card h4', '.feature-card p',
        '.path-item p', '.path-item span',
        '.stat-block strong',
        '.quote', '.blank-content',
        'i'
    ];
    const DRAG_SCHEMA_VERSION = 11;
    const hyperlinkBlockedClasses = [
        'content-wrapper', 'slides-container', 'slide', 'hero-wrapper',
        'feature-card', 'stat-block', 'col', 'path-item',
        'quote', 'achievement-extra', 'path-extra', 'two-columns-extra', 'blank-content'
    ];

    function applyDeletedElementsToSlide(slide, cache) {
        if (!slide || !cache) return;
        const deletedElementsById = cache.deletedElementsById || {};
        if (!Object.keys(deletedElementsById).length) return;
        const pendingRemovalElements = [];

        slide.querySelectorAll('.content-wrapper').forEach((container) => {
            draggableSelectors.forEach((selector) => {
                container.querySelectorAll(selector).forEach((el, index) => {
                    ensureElementId(el, selector, index);
                    if (deletedElementsById[el.id]) pendingRemovalElements.push(el);
                });
            });
        });

        pendingRemovalElements.forEach((el) => {
            if (el._placeholder && el._placeholder.parentElement) {
                el._placeholder.parentElement.removeChild(el._placeholder);
            }
            if (el.parentElement) el.parentElement.removeChild(el);
        });
    }

    function applyDeletedElementsToAllSlides(cache) {
        document.querySelectorAll('#slidesContainer .slide').forEach((slide) => {
            applyDeletedElementsToSlide(slide, cache);
        });
    }

    function isTextLikeDraggable(el) {
        if (!el) return false;
        const tag = (el.tagName || '').toUpperCase();
        const textTags = ['H1', 'H2', 'H3', 'H4', 'P', 'LI', 'SPAN', 'STRONG', 'FOOTER'];
        const blocked = ['feature-card', 'stat-block', 'col', 'path-item', 'quote', 'achievement-extra', 'path-extra', 'two-columns-extra', 'blank-content'];
        if (blocked.some(cls => el.classList && el.classList.contains(cls))) return false;
        if (el.tagName && el.tagName.toUpperCase() === 'I') return false;
        return textTags.includes(tag) || (el.classList && el.classList.contains('badge'));
    }

    function applyTightDragBox(el) {
        if (!isTextLikeDraggable(el)) return;
        el.style.display = 'inline-block';
        el.style.width = 'max-content';
        el.style.maxWidth = '100%';
        el.style.height = 'auto';
        el.style.whiteSpace = 'pre-wrap';
    }

    function insertLineBreakAtCursor() {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return;
        const range = selection.getRangeAt(0);
        range.deleteContents();
        const br = document.createElement('br');
        range.insertNode(br);
        range.setStartAfter(br);
        range.setEndAfter(br);
        selection.removeAllRanges();
        selection.addRange(range);
    }

    function setEditingAutoWidth(el, isEditing) {
        if (!isTextLikeDraggable(el)) return;
        if (isEditing) {
            el.dataset.editStartWidth = `${el.offsetWidth || 0}`;
            el.dataset.editStartHeight = `${el.offsetHeight || 0}`;
            el.dataset.editOldDisplay = el.style.display || '';
            el.dataset.editOldWidth = el.style.width || '';
            el.dataset.editOldHeight = el.style.height || '';
            el.dataset.editOldMaxWidth = el.style.maxWidth || '';
            el.dataset.editOldWhiteSpace = el.style.whiteSpace || '';
            el.dataset.editOldOverflow = el.style.overflow || '';
            el.dataset.editOldResize = el.style.resize || '';
            el.style.display = 'inline-block';
            el.style.width = 'max-content';
            el.style.maxWidth = '100%';
            el.style.whiteSpace = 'pre-wrap';
            // 编辑态禁止尺寸调整，只保留文本编辑
            el.style.overflow = 'visible';
            el.style.resize = 'none';
        } else {
            const startW = parseInt(el.dataset.editStartWidth || '0', 10);
            const startH = parseInt(el.dataset.editStartHeight || '0', 10);
            const resized = Math.abs((el.offsetWidth || 0) - startW) > 2 || Math.abs((el.offsetHeight || 0) - startH) > 2;
            el.style.display = el.dataset.editOldDisplay || '';
            if (!resized) {
                el.style.width = el.dataset.editOldWidth || '';
                el.style.height = el.dataset.editOldHeight || '';
            }
            el.style.maxWidth = el.dataset.editOldMaxWidth || '';
            el.style.whiteSpace = el.dataset.editOldWhiteSpace || '';
            el.style.overflow = el.dataset.editOldOverflow || '';
            el.style.resize = el.dataset.editOldResize || '';
        }
    }

    function persistElementSize(el) {
        if (!el || isLockedContainer(el)) return;
        if (!isMouseResizableTarget(el)) return;
        if (!el.id) {
            el.id = `drag-edit-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }
        const boundary = resolveDragBoundary(el);
        if (!boundary) return;
        const cache = getCache();
        cache.sizes = cache.sizes || {};
        cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
        cache.sizes[el.id] = {
            width: parseInt(el.offsetWidth, 10) || 0,
            height: parseInt(el.offsetHeight, 10) || 0,
            boundaryId: ensureBoundaryId(boundary),
            fingerprint: getElementFingerprint(el),
            v: DRAG_SCHEMA_VERSION
        };
        setCache(cache);
        scheduleCurrentThumbnailRefresh();
    }

    function getElementStableSignature(el) {
        if (!el) return '';
        const path = getElementPathKey(el);
        const unstable = new Set(['draggable', 'dragging', 'offline-svg-icon', 'is-selected', 'selection-blink']);
        const cls = Array.from(el.classList || []).filter(c => !unstable.has(c)).join('.');
        return `${path}|${el.tagName}|${cls}`;
    }

    function persistElementContent(el) {
        if (!el || isLockedContainer(el)) return;
        if (!el.id) {
            el.id = `drag-edit-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }
        const cache = getCache();
        cache.elementContent = cache.elementContent || {};
        cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
        cache.elementContent[el.id] = {
            html: el.innerHTML,
            signature: getElementStableSignature(el),
            v: DRAG_SCHEMA_VERSION
        };
        setCache(cache);
        scheduleCurrentThumbnailRefresh();
    }

    function persistTextBoxContainerState(editableEl) {
        const textBoxContainer = editableEl && editableEl.closest ? editableEl.closest('.textbox-widget') : null;
        if (!textBoxContainer) return false;

        persistElementContent(textBoxContainer);
        persistElementSize(textBoxContainer);

        const activeSlide = textBoxContainer.closest('.slide');
        if (activeSlide) {
            upsertDynamicElementInSlide(activeSlide, 'textbox', textBoxContainer, { name: '文本框' });
        }
        return true;
    }

    function persistElementPosition(el) {
        if (!el || isLockedContainer(el)) return;
        if (!el.id) return;
        const boundary = resolveDragBoundary(el);
        if (!boundary) return;
        const cache = getCache();
        cache.positions = cache.positions || {};
        cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
        cache.positions[el.id] = {
            left: parseInt(el.style.left, 10) || 0,
            top: parseInt(el.style.top, 10) || 0,
            boundaryId: ensureBoundaryId(boundary),
            signature: getElementStableSignature(el),
            fingerprint: getElementFingerprint(el),
            allowIconDrag: el.tagName && el.tagName.toUpperCase() === 'I',
            v: DRAG_SCHEMA_VERSION
        };
        setCache(cache);
        scheduleCurrentThumbnailRefresh();
    }

    function normalizeHyperlinkUrl(rawUrl) {
        const url = (rawUrl || '').trim();
        if (!url) return '';
        if (/^(https?:|mailto:|tel:|#|\/)/i.test(url)) return url;
        return `https://${url}`;
    }

    function isHyperlinkEligibleElement(el) {
        if (!el || !el.classList || !el.classList.contains('draggable')) return false;
        return !isLockedContainer(el) && !hyperlinkBlockedClasses.some((cls) => el.classList.contains(cls));
    }

    function applyElementHyperlink(el, linkInfo) {
        if (!el) return;
        const url = normalizeHyperlinkUrl(linkInfo?.url || '');
        if (!url) {
            el.classList.remove('has-hyperlink');
            delete el.dataset.hyperlinkUrl;
            delete el.dataset.hyperlinkTarget;
            delete el.dataset.hyperlinkTitle;
            if (el.title && el.title.startsWith('链接: ')) el.removeAttribute('title');
            return;
        }
        const target = (linkInfo?.target === '_self') ? '_self' : '_blank';
        const title = (linkInfo?.title || '').trim();
        el.dataset.hyperlinkUrl = url;
        el.dataset.hyperlinkTarget = target;
        if (title) el.dataset.hyperlinkTitle = title;
        else delete el.dataset.hyperlinkTitle;
        el.classList.add('has-hyperlink');
        el.title = title || `链接: ${url}`;
    }

    function persistElementHyperlink(el, linkInfo) {
        if (!el || !el.id) return;
        const cache = getCache();
        cache.elementLinks = cache.elementLinks || {};
        cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
        const url = normalizeHyperlinkUrl(linkInfo?.url || '');
        if (!url) {
            delete cache.elementLinks[el.id];
            setCache(cache);
            scheduleCurrentThumbnailRefresh();
            return;
        }
        cache.elementLinks[el.id] = {
            url,
            target: linkInfo?.target === '_self' ? '_self' : '_blank',
            title: (linkInfo?.title || '').trim(),
            signature: getElementStableSignature(el),
            v: DRAG_SCHEMA_VERSION
        };
        setCache(cache);
        scheduleCurrentThumbnailRefresh();
    }

    function applyCachedHyperlink(el, linkInfo) {
        if (!el || !linkInfo || linkInfo.v !== DRAG_SCHEMA_VERSION) return;
        if (linkInfo.signature && linkInfo.signature !== getElementStableSignature(el)) return;
        applyElementHyperlink(el, linkInfo);
    }

    function showHyperlinkInputDialog(currentLink = null, selectedCount = 1) {
        suspendInlineEditingBeforeDialog();
        const hint = selectedCount > 1 ? `将链接应用到 ${selectedCount} 个元素。` : '将链接应用到当前选中元素。';
        return showManagedFormDialog({
            ariaLabel: '设置超链接',
            title: '设置超链接',
            description: hint,
            clearText: '清除链接',
            okText: '保存',
            initialFocusSelector: '#hyperlinkUrlInput',
            bodyHtml: `
                <label class="form-dialog-label">
                    链接地址
                    <input id="hyperlinkUrlInput" class="form-dialog-input" type="text" placeholder="https://example.com" value="${escapeHtmlAttr(currentLink?.url || '')}" />
                </label>
                <label class="form-dialog-label">
                    提示文字（可选）
                    <input id="hyperlinkTitleInput" class="form-dialog-input" type="text" placeholder="鼠标悬停提示" value="${escapeHtmlAttr(currentLink?.title || '')}" />
                </label>
                <label class="form-dialog-label form-dialog-checkbox-label">
                    <input id="hyperlinkTargetInput" type="checkbox" ${(currentLink?.target || '_blank') === '_blank' ? 'checked' : ''} />
                    新窗口打开
                </label>
                <div class="form-dialog-hint">提示：编辑器内使用 Alt + 点击 可打开链接。</div>
            `,
            readPayload: (overlay) => {
                const urlInput = overlay.querySelector('#hyperlinkUrlInput');
                const titleInput = overlay.querySelector('#hyperlinkTitleInput');
                const targetInput = overlay.querySelector('#hyperlinkTargetInput');
                return {
                    url: urlInput ? urlInput.value : '',
                    title: titleInput ? titleInput.value : '',
                    target: targetInput && targetInput.checked ? '_blank' : '_self'
                };
            }
        });
    }

    function openHyperlinkDialogForSelection() {
        const targets = (selectedElements.size ? Array.from(selectedElements) : [selectedElement])
            .filter((el) => isHyperlinkEligibleElement(el));
        if (!targets.length) {
            showCustomConfirmDialog({
                title: '无法设置超链接',
                message: '请先选中一个非容器元素（如标题、段落、图片、图标、形状或表格）。',
                okText: '知道了',
                danger: false,
                showCancel: false
            });
            return;
        }

        const first = targets[0];
        const currentLink = first.dataset.hyperlinkUrl ? {
            url: first.dataset.hyperlinkUrl,
            target: first.dataset.hyperlinkTarget || '_blank',
            title: first.dataset.hyperlinkTitle || ''
        } : null;

        showHyperlinkInputDialog(currentLink, targets.length).then((result) => {
            if (!result || result.action === 'cancel') return;
            targets.forEach((el) => {
                if (result.action === 'clear') {
                    applyElementHyperlink(el, null);
                    persistElementHyperlink(el, null);
                    return;
                }
                const payload = {
                    url: result.url,
                    title: result.title,
                    target: result.target
                };
                applyElementHyperlink(el, payload);
                persistElementHyperlink(el, payload);
            });
        });
    }

    // ========== 批注功能 ==========
    function openCommentDialogForSelection() {
        const targets = (selectedElements.size ? Array.from(selectedElements) : [selectedElement])
            .filter((el) => el && !isLockedContainer(el));
        if (!targets.length) {
            showCustomConfirmDialog({
                title: '无法添加批注',
                message: '请先选中一个元素（可以是容器或非容器元素）。',
                okText: '知道了',
                danger: false,
                showCancel: false
            });
            return;
        }

        const first = targets[0];
        const currentComment = first.dataset.commentText || '';
        const commentAuthor = first.dataset.commentAuthor || '用户';
        const commentTime = first.dataset.commentTime || new Date().toLocaleString('zh-CN');

        showCommentInputDialog(currentComment, commentAuthor, commentTime, targets.length).then((result) => {
            if (!result || result.action === 'cancel') return;
            targets.forEach((el) => {
                if (result.action === 'clear') {
                    applyElementComment(el, null);
                    persistElementComment(el, null);
                    return;
                }
                const payload = {
                    text: result.text,
                    author: result.author,
                    time: new Date().toLocaleString('zh-CN')
