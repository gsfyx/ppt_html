<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>业务需求与软件设计汇报模板 | 企业数字化方案</title>
    <style>
        /* ---------- 全局基础样式（所有主题共享） ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            transition: background 0.3s ease, color 0.2s;
        }

        .slides-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
            overflow-y: auto;
            padding: 3rem 5rem;
            scrollbar-width: thin;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        .toolbar-panel[data-panel="transition"] .panel-btn.active {
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 6px;
        }

        .toolbar-panel[data-panel="animation"] .panel-btn.active {
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 6px;
        }

        .content-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            transition: all 0.3s;
            width: 100%;
        }

        .slide > .content-wrapper {
            min-height: 100% !important;
        }

        /* 通用卡片样式（各主题覆盖） */
        .feature-grid, .stat-duo, .two-columns, .path-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .feature-card {
            padding: 2.5rem;
            border-radius: 1.5rem;
            background: rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: all 0.3s ease;
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }
        .feature-card i {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        .feature-card h4 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .feature-card p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-muted, #5a5a6e);
        }
        .quote {
            padding: 2rem 2.5rem;
            border-radius: 1.5rem;
            font-size: 1.2rem;
            line-height: 1.7;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .quote i {
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: stretch;
        }
        .two-columns.single-col {
            grid-template-columns: 1fr;
        }
        .two-columns .col {
            padding: 2rem;
            border-radius: 1.5rem;
            background: rgba(255,255,255,0.5);
        }
        .two-columns .col h4 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .two-columns .col h4 i {
            font-size: 1.5rem;
        }
        .two-columns .insight-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .two-columns .insight-list li {
            padding: 0.8rem 0;
            font-size: 1.1rem;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }
        .two-columns .insight-list li i {
            margin-top: 0.3rem;
            flex-shrink: 0;
        }
        .two-columns + hr {
            margin: 2.5rem 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
        }
        .two-columns + hr + div {
            margin-top: 1.5rem;
            padding: 1.5rem 2rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .two-columns + hr + div i {
            margin-right: 0.5rem;
        }
        .stat-duo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-bottom: 2rem;
        }
        .stat-block {
            padding: 2.5rem;
            border-radius: 1.5rem;
            background: rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .stat-block:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }
        .stat-block strong {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        .stat-block strong i {
            font-size: 1.8rem;
        }
        .stat-block .insight-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .stat-block .insight-list li {
            padding: 0.8rem 0;
            font-size: 1.1rem;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }
        .stat-block .insight-list li i {
            margin-top: 0.3rem;
            flex-shrink: 0;
            font-size: 1rem;
        }
        .achievement-extra {
            padding: 1.8rem 2.5rem;
            border-radius: 1.2rem;
            font-size: 1.15rem;
            line-height: 1.7;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .achievement-extra i {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .achievement-extra strong {
            font-weight: 600;
            margin-right: 0.5rem;
        }
        .feature-card, .stat-block, .col, .path-item {
            transition: all 0.2s;
        }
        .path-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .path-item {
            padding: 2.5rem 1.5rem;
            border-radius: 1.5rem;
            background: rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }
        .path-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }
        .path-item:not(:last-child)::after {
            content: "→";
            position: absolute;
            right: -1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--primary, #c0392b);
            opacity: 0.5;
        }
        .path-item i {
            font-size: 2.5rem;
            margin-bottom: 1.2rem;
            opacity: 0.9;
        }
        .path-item p {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark, #1e1e2f);
        }
        .path-item span {
            font-size: 0.95rem;
            color: var(--text-muted, #5a5a6e);
            letter-spacing: 0.5px;
        }
        .path-extra {
            padding: 1.8rem 2.5rem;
            border-radius: 1.2rem;
            font-size: 1.15rem;
            line-height: 1.7;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .path-extra i {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .quote {
            transition: all 0.2s;
        }

        /* 左侧缩略图目录栏 */
        .slide-thumbnail-panel {
            position: fixed;
            left: 0;
            top: 84px;
            bottom: 0;
            width: 180px;
            background: #f8f9fa;
            border-right: 1px solid #e2e8f0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .thumbnail-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .thumbnail-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
        }

        .thumbnail-toggle-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            user-select: none;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .thumbnail-toggle-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .thumbnail-toggle-btn .label-expand {
            display: none;
        }

        .thumbnail-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: block;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e0 transparent;
        }

        .thumbnail-list::-webkit-scrollbar {
            width: 6px;
        }

        .thumbnail-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .thumbnail-list::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .thumbnail-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .thumbnail-item {
            position: relative;
            width: 100%;
            height: 90px;
            min-height: 90px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .thumbnail-item:last-child {
            margin-bottom: 0;
        }

        .thumbnail-item:hover {
            border-color: #cbd5e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .thumbnail-item.active {
            border-color: var(--primary, #c0392b);
            box-shadow: 0 0 0 2px var(--primary-light, rgba(192,57,43,0.2));
        }

        .thumbnail-item::before {
            content: attr(data-index);
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 500;
            z-index: 2;
        }

        .thumbnail-actions {
            position: absolute;
            top: 4px;
            right: 4px;
            display: none;
            gap: 4px;
            z-index: 3;
        }

        .thumbnail-item:hover .thumbnail-actions {
            display: flex;
        }

        .thumbnail-action-btn {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.7rem;
            color: #475569;
            transition: all 0.15s;
        }

        .thumbnail-action-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .thumbnail-action-btn.delete:hover {
            background: #fee2e2;
            border-color: #fecaca;
            color: #dc2626;
        }

        .thumbnail-content-preview {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: var(--card-bg, #fff);
            border-radius: 6px;
        }

        .thumbnail-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            padding: 8px;
        }

        /* 调整幻灯片容器位置，为左侧目录栏留出空间 - 适配超紧凑工具栏 */
        .slides-container {
            position: fixed;
            top: 72px;
            left: 180px;
            right: 0;
            bottom: 0;
            width: calc(100% - 180px);
            height: calc(100vh - 72px);
            overflow: hidden;
        }

        body.thumbnail-collapsed .slide-thumbnail-panel {
            width: 40px;
        }

        body.thumbnail-collapsed .thumbnail-header {
            padding: 10px 6px;
            justify-content: center;
        }

        body.thumbnail-collapsed .thumbnail-title,
        body.thumbnail-collapsed .thumbnail-list {
            display: none;
        }

        body.thumbnail-collapsed .thumbnail-toggle-btn {
            width: 28px;
            height: 28px;
        }

        body.thumbnail-collapsed .thumbnail-toggle-btn .label-collapse {
            display: none;
        }

        body.thumbnail-collapsed .thumbnail-toggle-btn .label-expand {
            display: inline;
        }

        body.thumbnail-collapsed .slides-container {
            left: 40px;
            width: calc(100% - 40px);
        }

        .page-index {
            position: fixed;
            bottom: 20px;
            right: 28px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 100;
            font-family: monospace;
        }

        /* ========== 全屏播放模式样式 ========== */
        body.fullscreen-mode {
            overflow: hidden;
        }

        body.fullscreen-mode .ppt-toolbar,
        body.fullscreen-mode .toolbar-panels,
        body.fullscreen-mode .slide-thumbnail-panel,
        body.fullscreen-mode .page-index {
            display: none !important;
        }

        body.fullscreen-mode .slides-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
        }

        body.fullscreen-mode .animation-order-badge {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        /* 全屏播放时的退出提示 */
        .fullscreen-exit-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        body.fullscreen-mode .fullscreen-exit-hint {
            opacity: 1;
        }

        body.fullscreen-mode .fullscreen-exit-hint.hidden {
            opacity: 0;
        }

        [contenteditable="true"],
        .draggable[contenteditable="true"] {
            outline: 2px dashed #c0392b;
            background-color: #fff5ef;
            border-radius: 6px;
            padding: 0 2px;
            cursor: text !important;
            user-select: text !important;
        }

        .draggable[contenteditable="true"] * {
            cursor: text !important;
        }

        /* ========== 顶部工具栏样式 - 超紧凑版 ========== */
        .ppt-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: #f8f9fa;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
            gap: 6px;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .toolbar-left {
            flex-shrink: 0;
        }

        .toolbar-right {
            flex: 1;
            justify-content: flex-end;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .toolbar-right::-webkit-scrollbar {
            display: none;
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.7rem;
            color: #475569;
            white-space: nowrap;
        }

        .toolbar-btn[hidden] {
            display: none !important;
        }

        .toolbar-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .toolbar-btn.primary {
            background: linear-gradient(135deg, #c0392b, #e67e22);
            color: white;
            padding: 2px 8px;
        }

        .toolbar-btn.primary:hover {
            background: linear-gradient(135deg, #a13024, #d35400);
        }

        .toolbar-btn i {
            font-size: 0.75rem;
        }

        .toolbar-divider {
            width: 1px;
            height: 16px;
            background: #d1d5db;
            margin: 0 2px;
        }

        /* 选项卡样式 - 超紧凑版 */
        .toolbar-tabs {
            display: flex;
            align-items: center;
            gap: 0;
            background: #e5e7eb;
            padding: 1px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .tab-item {
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tab-item:hover {
            color: #374151;
            background: rgba(255,255,255,0.6);
        }

        .tab-item.active {
            color: #c0392b;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 工具栏面板 - 超紧凑版 */
        .toolbar-panels {
            position: fixed;
            top: 28px;
            left: 0;
            right: 0;
            height: 44px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            z-index: 999;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .toolbar-panel {
            display: none;
            height: 100%;
            padding: 4px 10px;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }

        .toolbar-panel.active {
            display: flex;
        }

        .panel-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .panel-title {
            display: none;
        }

        .panel-btns {
            display: flex;
            gap: 2px;
        }

        .panel-btn {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 3px;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
            min-width: auto;
        }

        .panel-btn:hover {
            background: #f3f4f6;
        }

        .panel-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .panel-btn.disabled i,
        .panel-btn.disabled span {
            color: #9ca3af;
        }

        .panel-btn i {
            font-size: 0.8rem;
            color: #4b5563;
        }

        .panel-btn span {
            font-size: 0.65rem;
            color: #4b5563;
            white-space: nowrap;
        }

        .panel-btn.timing-setting {
            cursor: default;
            gap: 4px;
        }

        .timing-number-input {
            width: 52px;
            height: 24px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 12px;
            padding: 0 4px;
            text-align: center;
            background: #fff;
            color: #374151;
        }

        .timing-number-input:focus {
            outline: none;
            border-color: #93c5fd;
            box-shadow: 0 0 0 2px rgba(147, 197, 253, 0.25);
        }

        .timing-unit {
            font-size: 0.65rem;
            color: #6b7280;
        }

        .panel-btn.large {
            padding: 3px 8px;
        }

        .panel-btn.large i {
            font-size: 0.9rem;
        }

        .panel-divider {
            width: 1px;
            height: 28px;
            background: linear-gradient(180deg, transparent 0%, #d1d5db 20%, #d1d5db 80%, transparent 100%);
            flex-shrink: 0;
            margin: 0 2px;
        }

        /* 主题预览小图 */
        .theme-thumb {
            width: 24px;
            height: 18px;
            border-radius: 3px;
            margin-right: 4px;
        }

        .theme-thumb.red { background: linear-gradient(135deg, #c0392b, #e67e22); }
        .theme-thumb.blue { background: linear-gradient(135deg, #2c3e66, #3498db); }
        .theme-thumb.purple { background: linear-gradient(135deg, #6c5ce7, #a363d9); }
        .theme-thumb.minimal { background: #f1f5f9; border: 1px solid #ddd; }
        .theme-thumb.office { background: #eef2ff; border: 1px solid #dbeafe; }



        /* 可拖动元素样式 */
        .draggable {
            cursor: move;
            user-select: none;
            resize: none !important;
        }
        .draggable.dragging {
            z-index: 1000;
            opacity: 0.9;
        }
        .draggable.is-selected {
            position: relative;
        }
        .draggable.is-selected::after {
            content: "";
            position: absolute;
            inset: -3px;
            border: 2px solid rgba(37, 99, 235, 0.92);
            border-radius: 12px;
            pointer-events: none;
            animation: selected-outline-blink 1s ease-in-out infinite;
        }
        .draggable.has-hyperlink {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-decoration-style: dashed;
            text-underline-offset: 2px;
            text-decoration-color: rgba(37, 99, 235, 0.7);
        }
        /* 容器类元素使用 box-shadow 选中框，避免伪元素在复杂布局下发生偏移 */
        .resizable-container.is-selected {
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.92);
            border-radius: 12px;

<body class="theme-blue">

<!-- ========== 顶部工具栏（占位） ========== -->
<div class="ppt-toolbar" id="pptToolbar">
    <!-- 左侧：文件操作区 -->
    <div class="toolbar-section toolbar-left">
        <div class="toolbar-btn" title="撤销" id="undoBtn">
            <i class="fas fa-undo"></i>
        </div>
        <div class="toolbar-btn" title="重做" id="redoBtn">
            <i class="fas fa-redo"></i>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-btn primary" id="playBtn" title="从当前页播放">
            <i class="fas fa-play"></i>
            <span>播放</span>
        </div>
    </div>

    <!-- 中间：功能选项卡 -->
    <div class="toolbar-tabs">
        <div class="tab-item active" data-tab="home">开始</div>
        <div class="tab-item" data-tab="insert">插入</div>
        <div class="tab-item" data-tab="design">设计</div>
        <div class="tab-item" data-tab="transition">切换</div>
        <div class="tab-item" data-tab="animation">动画</div>
        
    </div>

    <!-- 右侧：常用工具区 -->
    <div class="toolbar-section toolbar-right">
        <div class="toolbar-btn" title="清空本地缓存" id="clearCacheBtn">
            <i class="fas fa-trash-alt"></i>
            <span>清空缓存</span>
        </div>
        <div class="toolbar-btn" title="导出当前缓存为JSON" id="exportCacheBtn" hidden data-feature-gated="true">
            <i class="fas fa-file"></i>
            <span>导出JSON</span>
        </div>
        <div class="toolbar-btn" title="导出当前数据为HTML" id="exportHtmlBtn">
            <i class="fas fa-file"></i>
            <span>导出HTML</span>
        </div>
        <div class="toolbar-btn" title="从JSON导入缓存" id="importCacheBtn" hidden data-feature-gated="true">
            <i class="fas fa-edit"></i>
            <span>导入JSON</span>
        </div>
    </div>
</div>

<!-- ========== 工具栏内容面板（占位） ========== -->
<div class="toolbar-panels" id="toolbarPanels">
    <!-- 开始面板 -->
    <div class="toolbar-panel active" data-panel="home">
        <div class="panel-group">
            <div class="panel-title">幻灯片</div>
            <div class="panel-btns">
                <div class="panel-btn" data-action="slide-add"><i class="fas fa-plus"></i><span>新建</span></div>
                <div class="panel-btn" data-action="slide-duplicate"><i class="fas fa-copy"></i><span>复制</span></div>
                <div class="panel-btn" data-action="slide-delete"><i class="fas fa-trash"></i><span>删除</span></div>
            </div>
        </div>
    </div>

    <!-- 插入面板 -->
    <div class="toolbar-panel" data-panel="insert">
        <div class="panel-group">
            <div class="panel-title">表格</div>
            <div class="panel-btns">
                <div class="panel-btn large" data-action="insert-table"><i class="fas fa-table"></i><span>插入表格</span></div>
            </div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-group">
            <div class="panel-title">图像</div>
            <div class="panel-btns">
                <div class="panel-btn" id="insertImageBtn" data-action="insert-image"><i class="fas fa-image"></i><span>图片</span></div>
                <div class="panel-btn" data-action="insert-icon"><i class="fas fa-icons"></i><span>图标</span></div>

        <div class="panel-divider"></div>
        <div class="panel-group">

                <div class="panel-btn" data-action="insert-comment"><i class="fas fa-comment"></i><span>批注</span></div>

    <!-- 设计面板 -->

                <div class="panel-btn theme-preview-btn" data-theme="purple"><div class="theme-thumb purple"></div><span>紫韵</span></div>
                <div class="panel-btn theme-preview-btn" data-theme="minimal"><div class="theme-thumb minimal"></div><span>简约</span></div>

            </div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-group">
            <div class="panel-title">自定义</div>
            <div class="panel-btns">
                <div class="panel-btn" id="bgApplyScopeBtn"><i class="fas fa-border-all"></i><span>背景范围: 全局</span></div>
                <div class="panel-btn" id="bgImageBtn"><i class="fas fa-image"></i><span>背景图片</span></div>
                <div class="panel-btn" id="clearBgImageBtn"><i class="fas fa-trash-alt"></i><span>清除背景</span></div>
            </div>
        </div>
    </div>

    <!-- 切换面板 -->
    <div class="toolbar-panel" data-panel="transition">
        <div class="panel-group">
            <div class="panel-title">切换到此幻灯片</div>
            <div class="panel-btns">
                <div class="panel-btn" data-transition="none"><i class="fas fa-arrow-right"></i><span>无</span></div>
                <div class="panel-btn" data-transition="fade"><i class="fas fa-door-open"></i><span>淡出</span></div>
                <div class="panel-btn" data-transition="push"><i class="fas fa-cube"></i><span>推进</span></div>
                <div class="panel-btn" data-transition="wipe"><i class="fas fa-arrows-alt-h"></i><span>擦除</span></div>
                <div class="panel-btn" data-transition="cover"><i class="fas fa-arrow-right"></i><span>覆盖</span></div>
                <div class="panel-btn" data-transition="uncover"><i class="fas fa-door-open"></i><span>显露</span></div>
                <div class="panel-btn" data-transition="zoom"><i class="fas fa-star"></i><span>缩放</span></div>
                <div class="panel-btn" data-transition="split"><i class="fas fa-random"></i><span>分割</span></div>
                <div class="panel-btn" data-transition="reveal"><i class="fas fa-star"></i><span>揭开</span></div>
                <div class="panel-btn timing-setting">
                    <i class="fas fa-clock"></i><span>持续时间</span>
                    <input class="timing-number-input" id="transitionDurationInput" type="number" min="0.1" max="10" step="0.1" value="1.0">
                    <span class="timing-unit">秒</span>
                </div>
            </div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-group">
            <div class="panel-title">计时</div>
            <div class="panel-btns">
                <div class="panel-btn timing-setting">
                    <i class="fas fa-hourglass-half"></i><span>自动换片</span>
                    <input class="timing-number-input" id="autoSlideTimeInput" type="number" min="1" max="300" step="1" value="5">
                    <span class="timing-unit">秒</span>
                </div>
                <div class="panel-btn" id="autoSlideToggleBtn"><i class="fas fa-toggle-on"></i><span>自动换片: 开</span></div>
            </div>
        </div>
    </div>

    <!-- 动画面板 -->
    <div class="toolbar-panel" data-panel="animation">
        <div class="panel-group">
            <div class="panel-title">动画</div>
            <div class="panel-btns">

<script>
    // ========== 缓存管理 ==========
    const FILE_KEY = window.location.pathname.split('/').pop() || 'ppt_template';

    function getCache() {
        try {
            const data = localStorage.getItem(FILE_KEY);
            const cache = data ? JSON.parse(data) : {};
            let mutated = false;
            ['deletedElementSignatures', 'deletedElementKeys'].forEach((k) => {
                if (cache && Object.prototype.hasOwnProperty.call(cache, k)) {
                    delete cache[k];
                    mutated = true;
                }
            });
            // 清理历史错误写入的删除键（曾使用重复 boundary id，导致切页后批量误删）
            if (cache && cache.deletedElementsById && typeof cache.deletedElementsById === 'object') {
                Object.keys(cache.deletedElementsById).forEach((k) => {
                    if (k.startsWith('drag-boundary-') || !k.startsWith('drag-slide')) {
                        delete cache.deletedElementsById[k];
                        mutated = true;
                    }
                });
            }
            if (mutated) {
                localStorage.setItem(FILE_KEY, JSON.stringify(cache));
            }
            return cache;
        } catch (e) {
            console.error('读取缓存失败:', e);
            return {};
        }
    }

    function setCache(data, options = {}) {
        try {
            localStorage.setItem(FILE_KEY, JSON.stringify(data));
            pushHistorySnapshot(data, options.reason || 'setCache', !!options.skipHistory);
        } catch (e) {
            console.error('保存缓存失败:', e);
        }
    }

    function updateCache(key, value, options = {}) {
        const cache = getCache();
        cache[key] = value;
        setCache(cache, options);
    }

    function applyThumbnailPanelState(collapsed) {
        const isCollapsed = !!collapsed;
        document.body.classList.toggle('thumbnail-collapsed', isCollapsed);
        const toggleBtn = document.getElementById('thumbnailToggleBtn');
        if (toggleBtn) {
            toggleBtn.setAttribute('aria-expanded', isCollapsed ? 'false' : 'true');
            toggleBtn.title = isCollapsed ? '展开目录栏' : '收起目录栏';
        }
    }

    function initThumbnailPanelToggle(cache) {
        applyThumbnailPanelState(!!(cache && cache.thumbnailCollapsed));
        const toggleBtn = document.getElementById('thumbnailToggleBtn');
        if (!toggleBtn || toggleBtn.dataset.bound === 'true') return;
        toggleBtn.dataset.bound = 'true';
        toggleBtn.addEventListener('click', () => {
            const nextCollapsed = !document.body.classList.contains('thumbnail-collapsed');
            applyThumbnailPanelState(nextCollapsed);
            updateCache('thumbnailCollapsed', nextCollapsed, { reason: 'thumbnail-panel-toggle', skipHistory: true });
        });
    }

    // ========== 撤销/重做 ==========
    const HISTORY_MAX_STATES = 120;
    let undoStack = [];
    let redoStack = [];
    let historyLastFingerprint = '';
    let historyRestoring = false;

    function cloneHistoryData(data) {
        return JSON.parse(JSON.stringify(data || {}));
    }

    function buildHistorySnapshot(cacheData, reason = 'change') {
        return {
            cache: cloneHistoryData(cacheData),
            currentIdx: Number.isFinite(currentIdx) ? currentIdx : 0,
            reason,
            ts: Date.now()
        };
    }

    function getHistoryFingerprint(snapshot) {
        try {
            return JSON.stringify({ cache: snapshot.cache, currentIdx: snapshot.currentIdx });
        } catch (err) {
            return '';
        }
    }

    function updateUndoRedoButtons() {
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        if (undoBtn) {
            const disabled = undoStack.length <= 1;
            undoBtn.classList.toggle('disabled', disabled);
            undoBtn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
            undoBtn.style.opacity = disabled ? '0.45' : '';
            undoBtn.style.cursor = disabled ? 'not-allowed' : '';
        }
        if (redoBtn) {
            const disabled = redoStack.length <= 0;
            redoBtn.classList.toggle('disabled', disabled);
            redoBtn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
            redoBtn.style.opacity = disabled ? '0.45' : '';
            redoBtn.style.cursor = disabled ? 'not-allowed' : '';
        }
    }

    function pushHistorySnapshot(cacheData, reason = 'change', skip = false) {
        if (skip || historyRestoring) return;
        const snapshot = buildHistorySnapshot(cacheData, reason);
        const fingerprint = getHistoryFingerprint(snapshot);
        if (!fingerprint || fingerprint === historyLastFingerprint) return;

        undoStack.push(snapshot);
        if (undoStack.length > HISTORY_MAX_STATES) {
            undoStack.splice(0, undoStack.length - HISTORY_MAX_STATES);
        }
        redoStack = [];
        historyLastFingerprint = fingerprint;
        updateUndoRedoButtons();
    }

    function resetHistoryWithCache(cacheData, reason = 'init') {
        undoStack = [];
        redoStack = [];
        historyLastFingerprint = '';
        pushHistorySnapshot(cacheData, reason, false);
    }

    function applyHistorySnapshot(snapshot) {
        if (!snapshot || !snapshot.cache) return false;
        historyRestoring = true;
        try {
            const cacheToApply = cloneHistoryData(snapshot.cache);
            setCache(cacheToApply, { skipHistory: true, reason: 'history-restore' });
            slidesData = Array.isArray(cacheToApply.slidesData) && cacheToApply.slidesData.length > 0
                ? cloneHistoryData(cacheToApply.slidesData)
                : JSON.parse(JSON.stringify(initialSlidesData));

            renderSlides();
            hydrateOfflineIcons(document);
            applyDeletedElementsToAllSlides(cacheToApply);
            generateThumbnails();

            const slides = document.querySelectorAll('.slide');
            totalSlides = slides.length;
            const maxIdx = Math.max(0, totalSlides - 1);
            const idx = Number.isFinite(snapshot.currentIdx) ? snapshot.currentIdx : 0;
            currentIdx = Math.max(0, Math.min(idx, maxIdx));
            updateSlidesAndThumbnails();
            enableDoubleClickEdit();
            enableDraggableElements();

            const restoredTheme = cacheToApply.theme || 'red';
            switchTheme(restoredTheme);
            return true;
        } finally {
            historyRestoring = false;
            historyLastFingerprint = getHistoryFingerprint(buildHistorySnapshot(getCache(), 'history-post-restore'));
            updateUndoRedoButtons();
        }
    }

    function performUndo() {
        if (undoStack.length <= 1) return false;
        const current = undoStack.pop();
        if (current) redoStack.push(current);
        const prev = undoStack[undoStack.length - 1];
        const ok = applyHistorySnapshot(prev);
        updateUndoRedoButtons();
        return ok;
    }

    function performRedo() {
        if (!redoStack.length) return false;
        const snapshot = redoStack.pop();
        if (!snapshot) return false;
        undoStack.push(snapshot);
        const ok = applyHistorySnapshot(snapshot);
        updateUndoRedoButtons();
        return ok;
    }

    async function fetchImageAsDataUrl(src) {
        if (!src || typeof src !== 'string') return null;
        if (/^data:image\//i.test(src)) return src;
        if (/^(blob:|https?:|\/)/i.test(src) || /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(src)) {
            try {
                const resp = await fetch(src);
                if (!resp.ok) return null;
                const blob = await resp.blob();
                if (!blob.type || !blob.type.toLowerCase().startsWith('image/')) return null;
                return await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : null);
                    reader.onerror = () => resolve(null);
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                return null;
            }
        }
        return null;
    }

    async function normalizeCacheImagesToBase64(cacheObj) {
        const cache = JSON.parse(JSON.stringify(cacheObj || {}));
        const imageSrcCache = new Map();

        async function normalizeSrc(src) {
            if (!src || typeof src !== 'string') return src;
            if (/^data:image\//i.test(src)) return src;
            if (imageSrcCache.has(src)) return imageSrcCache.get(src);
            const dataUrl = await fetchImageAsDataUrl(src);
            const normalized = dataUrl || src;
            imageSrcCache.set(src, normalized);
            return normalized;
        }

        async function normalizeHtmlImages(html) {
            if (typeof html !== 'string' || html.indexOf('<img') === -1) return html;
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const imgs = Array.from(doc.querySelectorAll('img[src]'));
            for (const img of imgs) {
                const originalSrc = img.getAttribute('src') || '';
                const normalizedSrc = await normalizeSrc(originalSrc);
                if (normalizedSrc) img.setAttribute('src', normalizedSrc);
            }
            return doc.body.innerHTML;
        }

        async function walk(node) {
            if (Array.isArray(node)) {
                for (let i = 0; i < node.length; i++) {
                    node[i] = await walk(node[i]);
                }
                return node;
            }
            if (!node || typeof node !== 'object') return node;

            for (const key of Object.keys(node)) {
                const value = node[key];
                if (key === 'src' && typeof value === 'string') {
                    node[key] = await normalizeSrc(value);
                    continue;
                }
                if (key === 'html' && typeof value === 'string') {
                    node[key] = await normalizeHtmlImages(value);
                    continue;
                }
                node[key] = await walk(value);
            }
            return node;
        }

        return walk(cache);
    }

    async function exportCacheAsJson() {
        const cache = getCache();
        const normalizedCache = await normalizeCacheImagesToBase64(cache);
        const payload = {
            version: 1,
            fileKey: FILE_KEY,
            exportedAt: new Date().toISOString(),
            cache: normalizedCache
        };
        downloadFile(
            JSON.stringify(payload, null, 2),
            `${FILE_KEY.replace(/\.html?$/i, '') || 'ppt_cache'}-cache.json`,
            'application/json;charset=utf-8'
        );
    }

    async function exportCacheAsHtml() {
        const cache = getCache();
        // 以运行时最新 slidesData 为准，避免仅导出到旧缓存状态。
        cache.slidesData = JSON.parse(JSON.stringify(slidesData));
        const normalizedCache = await normalizeCacheImagesToBase64(cache);
        const exportSlidesData = Array.isArray(normalizedCache.slidesData)
            ? normalizedCache.slidesData
            : JSON.parse(JSON.stringify(slidesData));

        const slidesDataLiteral = JSON.stringify(exportSlidesData, null, 4)
            .replace(/<\/script/gi, '<\\/script')
            .replace(/\u2028/g, '\\u2028')
            .replace(/\u2029/g, '\\u2029');

        // 导出前去除运行态绑定标记，避免导出文件初始化时误判“已绑定”而跳过事件注册。
        function stripRuntimeBindingFlagsFromHtml(rawHtml) {
            return String(rawHtml || '')
                .replace(/\sdata-bound=(?:"true"|'true')/gi, '')
                .replace(/\sdata-anim-click-bound=(?:"true"|'true')/gi, '');
        }

        const doctype = '<!DOCTYPE html>\n';
        const htmlText = stripRuntimeBindingFlagsFromHtml(doctype + document.documentElement.outerHTML);
        const slidesDataRegex = /(let\s+slidesData\s*=\s*)\[[\s\S]*?\n\s*\];/;
        if (!slidesDataRegex.test(htmlText)) {
            throw new Error('未找到 slidesData 初始化代码块');
        }
        const exportedHtml = htmlText.replace(slidesDataRegex, `$1${slidesDataLiteral};`);

        downloadFile(
            exportedHtml,
            `${FILE_KEY.replace(/\.html?$/i, '') || 'ppt'}-export.html`,
            'text/html;charset=utf-8'
        );
    }

    function applyImportedCache(cacheObj) {
        const importedCache = cacheObj && typeof cacheObj === 'object' ? cacheObj : {};
        setCache(importedCache);
        slidesData = Array.isArray(importedCache.slidesData)
            ? JSON.parse(JSON.stringify(importedCache.slidesData))
            : JSON.parse(JSON.stringify(initialSlidesData));
        refreshSlidesUI(0);
        const restoredTheme = importedCache.theme || 'red';
        switchTheme(restoredTheme);
        resetHistoryWithCache(getCache(), 'import-json');
    }

    async function importCacheFromJson() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json,.json';
        input.style.display = 'none';

        input.addEventListener('change', async () => {
            const file = input.files && input.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const parsed = JSON.parse(text);
                const cacheData = parsed && parsed.cache && typeof parsed.cache === 'object' ? parsed.cache : parsed;
                if (!cacheData || typeof cacheData !== 'object') {
                    throw new Error('JSON格式不正确');
                }
                applyImportedCache(cacheData);
                showCustomConfirmDialog({
                    title: '导入成功',
                    message: '缓存JSON已导入并应用。',
                    okText: '知道了',
                    danger: false,
                    showCancel: false
                });
            } catch (err) {
                showCustomConfirmDialog({
                    title: '导入失败',
                    message: `无法导入JSON：${err && err.message ? err.message : '文件格式错误'}`,
                    okText: '知道了',
                    danger: true,
                    showCancel: false
                });
            } finally {
                if (input.parentNode) input.parentNode.removeChild(input);
            }
        });

        document.body.appendChild(input);
        input.click();
    }

    // 将 Font Awesome 类名转换为 SVG 的辅助函数
    function getIconSvg(iconClass) {
        if (!iconClass) return '';
        const match = (iconClass.match(/fa-[a-z0-9-]+/i) || [])[0];
        return (match && svgIcons[match]) || '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor"><circle cx="12" cy="12" r="5"></circle></svg>';
    }

    function hydrateOfflineIcons(root = document) {
        root.querySelectorAll('i[class*="fa-"]').forEach((iconEl) => {
            if (iconEl.getAttribute('data-offline-icon') === 'true') return;
            const svg = getIconSvg(iconEl.className || '');
            iconEl.innerHTML = svg;
            iconEl.setAttribute('data-offline-icon', 'true');
            iconEl.classList.add('offline-svg-icon');
            iconEl.setAttribute('aria-hidden', 'true');
        });
    }

    function applySlideBackgroundStyle(slideElement, slideData) {
        if (!slideElement) return;
        slideElement.style.backgroundImage = '';
        slideElement.style.backgroundRepeat = '';
        slideElement.style.backgroundSize = '';
        slideElement.style.backgroundPosition = '';

        const bg = slideData && slideData.backgroundTile;
        if (!bg || !bg.src) return;
        const safeSrc = String(bg.src).replace(/"/g, '%22');
        slideElement.style.backgroundImage = `url("${safeSrc}")`;
        slideElement.style.backgroundRepeat = bg.repeat || 'repeat';
        slideElement.style.backgroundSize = bg.size || 'auto';
        slideElement.style.backgroundPosition = bg.position || '0 0';
    }

    function refreshAllRenderedSlideBackgrounds() {
        const renderedSlides = document.querySelectorAll('.slide');
        renderedSlides.forEach((slideEl, idx) => {
            applySlideBackgroundStyle(slideEl, slidesData[idx]);
        });
    }

    function getBackgroundApplyMode() {
        const cache = getCache();
        return cache.backgroundApplyMode === 'single' ? 'single' : 'global';
    }

    function updateBackgroundScopeButtons() {
        const mode = getBackgroundApplyMode();
        const scopeText = mode === 'single' ? '背景范围: 单页' : '背景范围: 全局';
        document.querySelectorAll('#bgApplyScopeBtn').forEach((btn) => {
            const span = btn.querySelector('span');
            if (span) span.textContent = scopeText;
        });
    }

    function toggleBackgroundApplyMode() {
        const next = getBackgroundApplyMode() === 'single' ? 'global' : 'single';
        updateCache('backgroundApplyMode', next, { reason: 'background-apply-mode' });
        updateBackgroundScopeButtons();
    }

    function setCurrentSlideTiledBackground(imageSrc) {
        if (!imageSrc || !Array.isArray(slidesData) || slidesData.length === 0) return;
        const mode = getBackgroundApplyMode();
        const globalBg = {
            src: imageSrc,
            repeat: 'repeat',
            size: 'auto',
            position: '0 0'
        };
        if (mode === 'single') {
            if (slidesData[currentIdx] && typeof slidesData[currentIdx] === 'object') {
                slidesData[currentIdx].backgroundTile = { ...globalBg };
            }
        } else {
            slidesData.forEach((slide) => {
                if (!slide || typeof slide !== 'object') return;
                slide.backgroundTile = { ...globalBg };
            });
        }
        updateCache('slidesData', slidesData, { reason: 'slide-background-image' });

        refreshAllRenderedSlideBackgrounds();
        generateThumbnails();
    }

    function clearCurrentSlideBackground() {
        if (!Array.isArray(slidesData) || slidesData.length === 0) return;
        const mode = getBackgroundApplyMode();
        if (mode === 'single') {
            if (slidesData[currentIdx] && typeof slidesData[currentIdx] === 'object') {
                delete slidesData[currentIdx].backgroundTile;
            }
        } else {
            slidesData.forEach((slide) => {
                if (!slide || typeof slide !== 'object') return;
                delete slide.backgroundTile;
            });
        }
        updateCache('slidesData', slidesData, { reason: 'slide-background-clear' });

        refreshAllRenderedSlideBackgrounds();
        generateThumbnails();
    }

    function selectSlideBackgroundImage() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) {
                if (fileInput.parentNode) fileInput.parentNode.removeChild(fileInput);
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const imageSrc = event && event.target ? event.target.result : '';
                if (imageSrc) setCurrentSlideTiledBackground(imageSrc);
                if (fileInput.parentNode) fileInput.parentNode.removeChild(fileInput);
            };
            reader.onerror = () => {
                if (fileInput.parentNode) fileInput.parentNode.removeChild(fileInput);
                showCustomConfirmDialog({
                    title: '读取失败',
                    message: '背景图片读取失败，请重试。',
                    okText: '知道了',
                    danger: true,
                    showCancel: false
                });
            };
            reader.readAsDataURL(file);
        });

        fileInput.click();
    }

    // 幻灯片翻页逻辑
    let currentIdx = 0;
    let totalSlides = 0;
    const DEFAULT_SLIDE_TRANSITION = 'none';
    const SLIDE_TRANSITION_SET = new Set(['none', 'fade', 'push', 'wipe', 'cover', 'uncover', 'zoom', 'split', 'reveal']);
    const DEFAULT_TRANSITION_DURATION_MS = 1000;
    const DEFAULT_AUTO_SLIDE_INTERVAL_MS = 5000;
    const DEFAULT_AUTO_SLIDE_ENABLED = true;
    let isSlideTransitioning = false;

    function getTransitionDurationMs() {
        const cache = getCache();

        return Number.isFinite(value) && value >= 100 ? Math.round(value) : DEFAULT_TRANSITION_DURATION_MS;
    }

    function getAutoSlideIntervalMs() {
        const cache = getCache();
        const value = Number(cache.autoSlideIntervalMs);
        return Number.isFinite(value) && value >= 1000 ? Math.round(value) : DEFAULT_AUTO_SLIDE_INTERVAL_MS;
    }

    function isAutoSlideEnabled() {
        const cache = getCache();
        const value = cache.autoSlideEnabled;
        if (typeof value === 'boolean') return value;
        if (typeof value === 'string') return value !== 'false' && value !== '0';
        if (typeof value === 'number') return value !== 0;

    }

    function formatMsToSecondsLabel(ms) {
        return `${(ms / 1000).toFixed(1)}秒`;
    }

    function refreshTransitionTimingButtons() {
        const transitionSeconds = (getTransitionDurationMs() / 1000).toFixed(1);
        const autoSlideSeconds = (getAutoSlideIntervalMs() / 1000).toFixed(0);
        const autoSlideToggleText = `自动换片: ${isAutoSlideEnabled() ? '开' : '关'}`;
        document.querySelectorAll('#transitionDurationInput').forEach((input) => {

    function normalizeSettingValue(value, min, max, decimals) {
        const factor = Math.pow(10, Math.max(0, decimals || 0));
        let next = Number(value);
        if (!Number.isFinite(next)) next = min;
        if (Number.isFinite(min)) next = Math.max(min, next);
        if (Number.isFinite(max)) next = Math.min(max, next);
        return Math.round(next * factor) / factor;
    }

    function applyTransitionDurationSeconds(seconds) {
        const value = normalizeSettingValue(seconds, 0.1, 10, 1);
        updateCache('transitionDurationMs', Math.round(value * 1000), { reason: 'transition-duration' });

    function applyAutoSlideIntervalSeconds(seconds) {

        refreshTransitionTimingButtons();
        restartAutoSlideTimer();

    function configureTransitionDuration() {
        const input = document.querySelector('#transitionDurationInput');
        if (input) {

            input.select();
        }
    }

    function configureAutoSlideInterval() {
        const input = document.querySelector('#autoSlideTimeInput');
        if (input) {
            input.focus();
            input.select();
        }
    }

    function initTransitionTimingInputs() {
        const allowKeys = new Set(['Tab', 'ArrowUp', 'ArrowDown', 'Home', 'End']);

        const durationInput = document.getElementById('transitionDurationInput');
        if (durationInput && durationInput.dataset.bound !== 'true') {
            durationInput.dataset.bound = 'true';
            durationInput.addEventListener('keydown', (ev) => {
                if (allowKeys.has(ev.key) || ev.ctrlKey || ev.metaKey || ev.altKey) return;
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    durationInput.blur();
                    return;
                }
                ev.preventDefault();
            });
            durationInput.addEventListener('paste', (ev) => ev.preventDefault());
            durationInput.addEventListener('change', () => {
                applyTransitionDurationSeconds(durationInput.value);
            });
            durationInput.addEventListener('wheel', (ev) => {
                if (document.activeElement !== durationInput) return;
                ev.preventDefault();
                const delta = ev.deltaY < 0 ? 0.1 : -0.1;
                applyTransitionDurationSeconds((getTransitionDurationMs() / 1000) + delta);
            }, { passive: false });
        }

        const autoSlideInput = document.getElementById('autoSlideTimeInput');
        if (autoSlideInput && autoSlideInput.dataset.bound !== 'true') {
            autoSlideInput.dataset.bound = 'true';
            autoSlideInput.addEventListener('keydown', (ev) => {
                if (allowKeys.has(ev.key) || ev.ctrlKey || ev.metaKey || ev.altKey) return;
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    autoSlideInput.blur();
                    return;
                }
                ev.preventDefault();
            });
            autoSlideInput.addEventListener('paste', (ev) => ev.preventDefault());
            autoSlideInput.addEventListener('change', () => {
                applyAutoSlideIntervalSeconds(autoSlideInput.value);
            });
            autoSlideInput.addEventListener('wheel', (ev) => {
                if (document.activeElement !== autoSlideInput) return;
                ev.preventDefault();
                const delta = ev.deltaY < 0 ? 1 : -1;
                applyAutoSlideIntervalSeconds((getAutoSlideIntervalMs() / 1000) + delta);
            }, { passive: false });
        }
    }

    const DEFAULT_ELEMENT_ANIMATION = {
        type: 'none',
        start: 'with-previous',
        durationMs: 600,
        delayMs: 0,
        order: 0
    };
    const ELEMENT_ANIMATION_START_ORDER = ['with-previous', 'after-previous', 'on-click'];
    const ELEMENT_ANIMATION_START_LABEL = {
        'with-previous': '开始: 与上一动画同时',
        'after-previous': '开始: 上一动画之后',
        'on-click': '开始: 单击时'
    };
    let pendingClickElementAnimations = [];

    function normalizeElementAnimationConfig(config) {
        const source = config && typeof config === 'object' ? config : {};
        const typeSet = new Set(['none', 'fade-in', 'fade-out', 'fly-in', 'slide-in-left', 'slide-in-right', 'drop-in', 'pop-in', 'bounce-in', 'zoom-in', 'rotate-in']);
        const start = ELEMENT_ANIMATION_START_ORDER.includes(source.start) ? source.start : DEFAULT_ELEMENT_ANIMATION.start;
        const type = typeSet.has(source.type) ? source.type : DEFAULT_ELEMENT_ANIMATION.type;
        const durationMs = Math.round(normalizeSettingValue(source.durationMs, 100, 10000, 0));
        const delayMs = Math.round(normalizeSettingValue(source.delayMs, 0, 10000, 0));
        const orderValue = Number(source.order);
        const order = Number.isFinite(orderValue) && orderValue > 0 ? Math.floor(orderValue) : 0;
        return { type, start, durationMs, delayMs, order: type === 'none' ? 0 : order };
    }

    function allocateElementAnimationOrder(cache) {
        const current = Number(cache.elementAnimationOrderSeed);
        const next = Number.isFinite(current) && current > 0 ? Math.floor(current) + 1 : 1;
        cache.elementAnimationOrderSeed = next;
        return next;
    }

    function getElementAnimationCache() {
        const cache = getCache();
        return (cache.elementAnimations && typeof cache.elementAnimations === 'object') ? cache.elementAnimations : {};
    }

    function getElementAnimationConfig(element) {
        if (!element || !element.id) return { ...DEFAULT_ELEMENT_ANIMATION };
        const cacheMap = getElementAnimationCache();
        const fromCache = cacheMap[element.id];
        if (fromCache) return normalizeElementAnimationConfig(fromCache);
        const slide = element.closest('.slide');
        if (!slide) return { ...DEFAULT_ELEMENT_ANIMATION };
        const slideIndex = Array.from(document.querySelectorAll('.slide')).indexOf(slide);
        const slideAnimations = slideIndex >= 0 && slidesData[slideIndex] && slidesData[slideIndex].elementAnimations;
        if (slideAnimations && slideAnimations[element.id]) {
            return normalizeElementAnimationConfig(slideAnimations[element.id]);
        }
        return { ...DEFAULT_ELEMENT_ANIMATION };
    }

    function persistElementAnimation(element, partialConfig) {
        if (!element || isLockedContainer(element)) return;
        if (!element.id) {
            element.id = `anim-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }
        const patch = partialConfig && typeof partialConfig === 'object' ? partialConfig : {};
        const prevConfig = getElementAnimationConfig(element);
        const nextConfig = normalizeElementAnimationConfig({
            ...prevConfig,
            ...patch
        });

        const cache = getCache();
        if (nextConfig.type === 'none') {
            nextConfig.order = 0;
        } else {
            const typeWasExplicitlySet = Object.prototype.hasOwnProperty.call(patch, 'type');
            if (typeWasExplicitlySet) {
                nextConfig.order = allocateElementAnimationOrder(cache);
            } else if (!Number.isFinite(nextConfig.order) || nextConfig.order <= 0) {
                nextConfig.order = allocateElementAnimationOrder(cache);
            }
        }
        cache.elementAnimations = cache.elementAnimations && typeof cache.elementAnimations === 'object' ? cache.elementAnimations : {};
        cache.elementAnimations[element.id] = nextConfig;
        setCache(cache, { reason: 'element-animation' });

        const slide = element.closest('.slide');
        const slideIndex = slide ? Array.from(document.querySelectorAll('.slide')).indexOf(slide) : -1;
        if (slideIndex >= 0 && slidesData[slideIndex]) {
            if (!slidesData[slideIndex].elementAnimations || typeof slidesData[slideIndex].elementAnimations !== 'object') {
                slidesData[slideIndex].elementAnimations = {};
            }
            slidesData[slideIndex].elementAnimations[element.id] = nextConfig;
            updateCache('slidesData', slidesData, { reason: 'element-animation-slide' });

        element.dataset.elementAnimationStart = nextConfig.start;
        element.dataset.elementAnimationDurationMs = String(nextConfig.durationMs);
        element.dataset.elementAnimationDelayMs = String(nextConfig.delayMs);
        element.dataset.elementAnimationOrder = String(nextConfig.order || 0);
    }

    function collectElementAnimationTasks(slide) {
        if (!slide) return [];
        const tasks = [];
        slide.querySelectorAll('.draggable').forEach((el) => {
            if (!el.id || isLockedContainer(el)) return;
            const cfg = getElementAnimationConfig(el);
            if (!cfg || cfg.type === 'none') return;
            tasks.push({ el, cfg });
        });
        tasks.sort((a, b) => {
            const orderA = Number(a.cfg && a.cfg.order);
            const orderB = Number(b.cfg && b.cfg.order);
            const hasOrderA = Number.isFinite(orderA) && orderA > 0;
            const hasOrderB = Number.isFinite(orderB) && orderB > 0;
            if (hasOrderA && hasOrderB && orderA !== orderB) return orderA - orderB;
            if (hasOrderA !== hasOrderB) return hasOrderA ? -1 : 1;

    function refreshElementAnimationOrderBadges() {

        const slide = document.querySelector('#slidesContainer .slide.active');
        const tasks = collectElementAnimationTasks(slide);
        tasks.forEach((task, idx) => {
            const el = task.el;
            if (!el || !el.isConnected) return;
            if (window.getComputedStyle(el).position === 'static') {
                el.style.position = 'relative';

            const badge = document.createElement('div');
            badge.className = 'animation-order-badge';
            badge.dataset.role = 'element-animation-order';
            badge.textContent = String(idx + 1);
            badge.title = `动画顺序: ${idx + 1}`;
            el.appendChild(badge);
        });
    }

    function refreshElementAnimationPanel() {
        const primary = selectedElement && selectedElement.isConnected ? selectedElement : null;
        const hasTarget = !!primary;
        const config = hasTarget ? getElementAnimationConfig(primary) : { ...DEFAULT_ELEMENT_ANIMATION };

        document.querySelectorAll('.toolbar-panel[data-panel="animation"] .panel-btn[data-element-animation]').forEach((btn) => {
            const type = btn.getAttribute('data-element-animation') || 'none';
            btn.classList.toggle('active', hasTarget && config.type === type);
            btn.classList.toggle('disabled', !hasTarget);
        });

        document.querySelectorAll('#elementAnimStartBtn').forEach((btn) => {
            btn.classList.toggle('disabled', !hasTarget);
            const span = btn.querySelector('span');
            if (span) span.textContent = ELEMENT_ANIMATION_START_LABEL[config.start] || ELEMENT_ANIMATION_START_LABEL['with-previous'];
        });

        document.querySelectorAll('#elementAnimDurationInput').forEach((input) => {
            input.disabled = !hasTarget;
            const value = (config.durationMs / 1000).toFixed(1);
            if (input.value !== value) input.value = value;
        });

        document.querySelectorAll('#elementAnimDelayInput').forEach((input) => {
            input.disabled = !hasTarget;
            const value = (config.delayMs / 1000).toFixed(1);
            if (input.value !== value) input.value = value;
        });

    function applyAnimationTypeToSelection(type) {
        const targets = Array.from(selectedElements).filter((el) => el && el.isConnected && !isLockedContainer(el));
        if (!targets.length && selectedElement && !isLockedContainer(selectedElement)) targets.push(selectedElement);
        if (!targets.length) return;
        targets.forEach((el) => persistElementAnimation(el, { type }));
        refreshElementAnimationPanel();
    }

    function cycleElementAnimationStartMode() {
        const target = selectedElement;
        if (!target || isLockedContainer(target)) return;
        const config = getElementAnimationConfig(target);
        const idx = ELEMENT_ANIMATION_START_ORDER.indexOf(config.start);
        const nextStart = ELEMENT_ANIMATION_START_ORDER[(idx + 1) % ELEMENT_ANIMATION_START_ORDER.length];
        Array.from(selectedElements).forEach((el) => {
            if (el && el.isConnected && !isLockedContainer(el)) persistElementAnimation(el, { start: nextStart });

    function updateElementAnimationTimingFromInput(kind, inputValue) {
        const seconds = Number(inputValue);
        if (!Number.isFinite(seconds)) return;
        const targets = Array.from(selectedElements).filter((el) => el && el.isConnected && !isLockedContainer(el));
        if (!targets.length && selectedElement && !isLockedContainer(selectedElement)) targets.push(selectedElement);
        if (!targets.length) return;
        const ms = kind === 'duration'
            ? Math.round(normalizeSettingValue(seconds * 1000, 100, 10000, 0))

        const patch = kind === 'duration' ? { durationMs: ms } : { delayMs: ms };

    function buildElementAnimationKeyframes(type) {
        switch (type) {
            case 'fade-in':
                return [{ opacity: 0 }, { opacity: 1 }];
            case 'fade-out':
                return [{ transform: 'translateY(0)', opacity: 1 }, { transform: 'translateY(-4px)', opacity: 0 }];
            case 'fly-in':
                return [{ transform: 'translateY(24px)', opacity: 0 }, { transform: 'translateY(0)', opacity: 1 }];
            case 'slide-in-left':
                return [{ transform: 'translateX(-28px)', opacity: 0 }, { transform: 'translateX(0)', opacity: 1 }];
            case 'slide-in-right':
                return [{ transform: 'translateX(28px)', opacity: 0 }, { transform: 'translateX(0)', opacity: 1 }];
            case 'drop-in':
                return [{ transform: 'translateY(-26px)', opacity: 0 }, { transform: 'translateY(0)', opacity: 1 }];
            case 'pop-in':
                return [{ transform: 'scale(0.65)', opacity: 0 }, { transform: 'scale(1)', opacity: 1 }];
            case 'bounce-in':
                return [
                    { transform: 'scale(0.78)', opacity: 0 },
                    { transform: 'scale(1.06)', opacity: 1, offset: 0.72 },
                    { transform: 'scale(1)', opacity: 1 }
                ];
            case 'zoom-in':
                return [{ transform: 'scale(0.82)', opacity: 0.2 }, { transform: 'scale(1)', opacity: 1 }];
            case 'rotate-in':
                return [{ transform: 'rotate(-12deg) scale(0.92)', opacity: 0.2 }, { transform: 'rotate(0deg) scale(1)', opacity: 1 }];

        }
