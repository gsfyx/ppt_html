                cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
                
                // 获取当前旋转角度
                const currentTransform = rotatingElement.style.transform || '';
                const rotateMatch = currentTransform.match(/rotate\(([^)]+)deg\)/);
                const currentRotation = rotateMatch ? parseFloat(rotateMatch[1]) || 0 : 0;
                
                cache.rotations[rotatingElement.id] = {
                    rotation: currentRotation,
                    boundaryId: ensureBoundaryId(rotateBoundaryElement),
                    fingerprint: getElementFingerprint(rotatingElement),
                    v: DRAG_SCHEMA_VERSION
                };
                setCache(cache);
                scheduleCurrentThumbnailRefresh();
                
                rotatingElement = null;
                rotateBoundaryElement = null;
                rotateStartX = 0;
                rotateStartY = 0;
                rotateCenterX = 0;
                rotateCenterY = 0;
                rotateStartAngle = 0;
                currentRotateAngle = 0;
                return;
            }
            
            if (resizingElement) {
                const cache = getCache();
                cache.sizes = cache.sizes || {};
                cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
                cache.sizes[resizingElement.id] = {
                    width: parseInt(resizingElement.offsetWidth, 10) || 0,
                    height: parseInt(resizingElement.offsetHeight, 10) || 0,
                    boundaryId: ensureBoundaryId(resizeBoundaryElement),
                    fingerprint: getElementFingerprint(resizingElement),
                    v: DRAG_SCHEMA_VERSION
                };
                setCache(cache);
                scheduleCurrentThumbnailRefresh();

                resizingElement = null;
                resizeGroupState = null;
                resizeBoundaryElement = null;
                resizeDirection = '';
                return;
            }

            if (!draggedElement) return;

            if (dragHasMoved) {
                const cache = getCache();
                cache.positions = cache.positions || {};
                cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;

                const movedElements = (dragGroupState && dragGroupState.items && dragGroupState.items.length > 1)
                    ? dragGroupState.items.map(item => item.el)
                    : [draggedElement];

                movedElements.forEach((el) => {
                    cache.positions[el.id] = {
                        left: parseInt(el.style.left, 10) || 0,
                        top: parseInt(el.style.top, 10) || 0,
                        boundaryId: ensureBoundaryId(dragBoundaryElement),
                        signature: getElementStableSignature(el),
                        fingerprint: getElementFingerprint(el),
                        allowIconDrag: el.tagName && el.tagName.toUpperCase() === 'I',
                        v: DRAG_SCHEMA_VERSION
                    };
                });
                setCache(cache);
                scheduleCurrentThumbnailRefresh();

                movedElements.forEach((el) => {
                    el.classList.remove('dragging');
                    el.style.zIndex = '100';
                    if (el.tagName && el.tagName.toUpperCase() === 'I') {
                        el.style.display = 'inline-flex';
                    }
                });
            }

            draggedElement = null;
            dragBoundaryElement = null;
            dragGroupState = null;
            dragHasMoved = false;
            dragStartRect = null;
            dragStartLeft = 0;
            dragStartTop = 0;
            dragWasAbsolute = false;
            e.stopPropagation();
        });
    }

    function enableDraggableElements() {
        const dragRoot = document.getElementById('slidesContainer');
        if (!dragRoot) return;
        const activeSlide = dragRoot.querySelector('.slide.active');
        if (!activeSlide) return;

        // 所有可作为拖动边界的容器都标记为 boundary，且使用相对定位
        activeSlide.querySelectorAll(dragBoundarySelectors.join(',')).forEach((boundary) => {
            boundary.setAttribute('data-drag-boundary', 'true');
            if (getComputedStyle(boundary).position === 'static') {
                boundary.style.position = 'relative';
            }
            ensureBoundaryId(boundary);
        });

        const cache = getCache();
        if (cache.dragSchemaVersion !== DRAG_SCHEMA_VERSION) {
            cache.positions = {};
            cache.sizes = {};
            cache.elementContent = {};
            cache.elementLinks = {};
            // Reset deletion tombstones on schema upgrades to avoid carrying forward poisoned ids.
            cache.deletedElementsById = {};
            cache.dragSchemaVersion = DRAG_SCHEMA_VERSION;
            setCache(cache);
        }
        const positions = cache.positions || {};
        const sizes = cache.sizes || {};
        const rotations = cache.rotations || {};
        const elementContent = cache.elementContent || {};
        const elementLinks = cache.elementLinks || {};
        const deletedElementsById = cache.deletedElementsById || {};
        const pendingRemovalElements = [];

        activeSlide.querySelectorAll('.content-wrapper').forEach(container => {
            if (getComputedStyle(container).position === 'static') {
                container.style.position = 'relative';
            }

            draggableSelectors.forEach(selector => {
                container.querySelectorAll(selector).forEach((el, index) => {
                    ensureElementId(el, selector, index);
                    el.setAttribute('data-draggable-bound', 'true');

                    if (deletedElementsById[el.id]) {
                        pendingRemovalElements.push(el);
                        return;
                    }

                    // 锁定最底层容器不可拖动
                    if (isLockedContainer(el)) {
                        el.classList.remove('draggable');
                        return;
                    }

                    el.classList.add('draggable');
                    ensureResizeHandles(el);
                    applyCachedContent(el, elementContent[el.id]);
                    applyCachedHyperlink(el, elementLinks[el.id]);
                    applyCachedPosition(el, positions[el.id]);
                    applyCachedSize(el, sizes[el.id]);
                    applyCachedRotation(el, rotations[el.id]);
                    
                    // 如果元素是表格，重新绑定单元格编辑事件
                    if (el.querySelector('table')) {
                        bindTableCellEditEvents(el);
                    }
                    // 如果元素是图片，确保图片样式正确
                    if (el.classList.contains('image-widget')) {
                        const img = el.querySelector('img');
                        if (img) {
                            img.style.pointerEvents = 'none';
                            img.style.userSelect = 'none';
                        }
                    }
                });
            });
        });

        pendingRemovalElements.forEach((el) => {
            if (el._placeholder && el._placeholder.parentElement) {
                el._placeholder.parentElement.removeChild(el._placeholder);
            }
            if (el.parentElement) el.parentElement.removeChild(el);
        });

        bindGlobalDragEventsOnce();
        refreshElementAnimationOrderBadges();
    }

    document.addEventListener('mousedown', (e) => {
        if (e.target.closest('.custom-confirm-overlay') || e.target.closest('.custom-confirm-dialog')) return;
        if (handleTableGridResizeMouseDown(e)) return;
        if (e.target.closest('#thumbnailPanel')) return;
        const isCtrlMultiSelect = e.ctrlKey;
        const activeSlide = document.querySelector('#slidesContainer .slide.active');
        if (!activeSlide) return;

        const clickedDraggable = e.target.closest('.draggable');
        const clickedResizeHandle = e.target.closest('.resize-handle');
        const clickedEditable = e.target.closest('[contenteditable="true"]');
        const inActiveSlide = activeSlide.contains(e.target);
        const inToolbar = e.target.closest('#pptToolbar') || e.target.closest('#toolbarPanels') || e.target.closest('.ppt-toolbar') || e.target.closest('.toolbar-panels');
        if (!clickedDraggable && !clickedResizeHandle && !clickedEditable) {
            if (e.button === 0 && inActiveSlide && !inToolbar) {
                if (!isCtrlMultiSelect) clearSelectedElement();
                beginMarqueeSelection(e, activeSlide, isCtrlMultiSelect);
                e.preventDefault();
                e.stopPropagation();
                return;
            }
            if (!isCtrlMultiSelect && !inToolbar) clearSelectedElement();
        }

        if (clickedEditable) {
            const editableContainer = clickedEditable.closest('.draggable');
            if (editableContainer && activeSlide.contains(editableContainer) && selectedElement !== editableContainer) {
                setSelectedElement(editableContainer);
            }
            // Let native text caret/selection proceed instead of entering drag mode.
            return;
        }

        const resizeHandle = e.target.closest('.resize-handle');
        if (resizeHandle) {
            const targetContainer = resizeHandle.closest('.resizable-container');
            if (!targetContainer || !activeSlide || !activeSlide.contains(targetContainer)) return;
            if (targetContainer.getAttribute('contenteditable') === 'true') return;
            const boundary = resolveDragBoundary(targetContainer);
            if (!boundary) return;
            const inCurrentMultiSelection = selectedElements.size > 1 && selectedElements.has(targetContainer) && selectionBoundaryElement === boundary;

            // 单选模式下：必须先选中，再允许缩放；多选已命中元素可直接进入组缩放
            if (!inCurrentMultiSelection && selectedElement !== targetContainer) {
                setSelectedElement(targetContainer);
                e.preventDefault();
                e.stopPropagation();
                return;
            }
            const direction = resizeHandle.getAttribute('data-resize-direction') || 'se';
            const canStartGroupResize = inCurrentMultiSelection;
            if (!canStartGroupResize) {
                setSelectedElement(targetContainer);
            }

            resizeDirection = direction;
            resizeStartX = e.clientX;
            resizeStartY = e.clientY;
            resizeBoundaryElement = boundary;

            if (canStartGroupResize) {
                const boundaryRect = boundary.getBoundingClientRect();
                const items = Array.from(selectedElements)
                    .filter(el => resolveDragBoundary(el) === boundary && isMouseResizableTarget(el))
                    .map((el) => {
                        const rect = el.getBoundingClientRect();
                        const minSize = getResizeMinSize(el);
                        // Normalize to absolute positioning to avoid resizing flow layout side effects.
                        if (getComputedStyle(el).position !== 'absolute') {
                            createPersistentPlaceholder(el, rect);
                            el.style.position = 'absolute';
                            el.style.left = `${rect.left - boundaryRect.left}px`;
                            el.style.top = `${rect.top - boundaryRect.top}px`;
                            if (el.tagName && el.tagName.toUpperCase() === 'I') {
                                el.style.display = 'inline-flex';
                                el.style.minWidth = `${rect.width}px`;
                                el.style.minHeight = `${rect.height}px`;
                                el.style.alignItems = 'center';
                                el.style.justifyContent = 'center';
                            } else if (isTextLikeDraggable(el)) {
                                applyTightDragBox(el);
                                el.style.margin = '0';
                            } else {
                                el.style.width = `${rect.width}px`;
                                el.style.height = `${rect.height}px`;
                                el.style.margin = '0';
                            }
                        }
                        return {
                            el,
                            startRect: rect,
                            startWidth: parseInt(el.offsetWidth, 10) || Math.round(rect.width),
                            startHeight: parseInt(el.offsetHeight, 10) || Math.round(rect.height),
                            minW: minSize.minW,
                            minH: minSize.minH
                        };
                    });

                if (items.length > 1) {
                    resizeGroupState = {
                        items,
                        boundary,
                        direction,
                        startX: e.clientX,
                        startY: e.clientY
                    };
                    resizingElement = null;
                } else {
                    resizeGroupState = null;
                    resizingElement = targetContainer;
                    resizeStartWidth = targetContainer.offsetWidth;
                    resizeStartHeight = targetContainer.offsetHeight;
                }
            } else {
                resizeGroupState = null;
                resizingElement = targetContainer;
                resizeStartWidth = targetContainer.offsetWidth;
                resizeStartHeight = targetContainer.offsetHeight;
            }

            e.preventDefault();
            e.stopPropagation();
            return;
        }
        
        const rotateHandle = e.target.closest('.rotate-handle');
        if (rotateHandle) {
            const targetContainer = rotateHandle.closest('.resizable-container');
            if (!targetContainer || !activeSlide || !activeSlide.contains(targetContainer)) return;
            if (targetContainer.getAttribute('contenteditable') === 'true') return;
            // 检查是否为形状元素（只有形状元素才能旋转）
            if (!targetContainer.classList.contains('shape-widget')) return;
            const boundary = resolveDragBoundary(targetContainer);
            if (!boundary) return;
            
            // 确保元素被选中
            if (selectedElement !== targetContainer) {
                setSelectedElement(targetContainer);
            }
            
            rotatingElement = targetContainer;
            rotateBoundaryElement = boundary;
            
            // 计算起始角度
            const rect = targetContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const startX = e.clientX;
            const startY = e.clientY;
            
            // 获取当前旋转角度
            const currentTransform = targetContainer.style.transform || '';
            const currentRotateMatch = currentTransform.match(/rotate\(([^)]+)\)/);
            currentRotateAngle = currentRotateMatch ? parseFloat(currentRotateMatch[1]) || 0 : 0;
            
            // 计算起始角度
            const startAngle = Math.atan2(startY - centerY, startX - centerX) * 180 / Math.PI;
            
            rotateStartX = startX;
            rotateStartY = startY;
            rotateCenterX = centerX;
            rotateCenterY = centerY;
            rotateStartAngle = startAngle;
            
            e.preventDefault();
            e.stopPropagation();
            return;
        }

        const target = e.target.closest('.draggable');
        if (!target) return;
        if (!activeSlide || !activeSlide.contains(target)) return;
        if (target.getAttribute('contenteditable') === 'true' || clickedEditable) return;
        if (e.detail > 1) return;
        if (isLockedContainer(target)) return;

        if (isCtrlMultiSelect) {
            toggleSelectedElement(target);
            e.preventDefault();
            e.stopPropagation();
            return;
        }

        const boundary = resolveDragBoundary(target);
        if (!boundary) return;

        const canStartGroupDrag = selectedElements.size > 1 && selectedElements.has(target) && selectionBoundaryElement === boundary;
        if (!canStartGroupDrag) {
            setSelectedElement(target);
        }

        const targetRect = target.getBoundingClientRect();
        const boundaryRect = boundary.getBoundingClientRect();

        dragBoundaryElement = boundary;
        draggedElement = target;
        dragStartClientX = e.clientX;
        dragStartClientY = e.clientY;
        dragHasMoved = false;
        dragStartRect = target.getBoundingClientRect();
        dragWasAbsolute = getComputedStyle(target).position === 'absolute';

        dragOffsetX = e.clientX - targetRect.left;
        dragOffsetY = e.clientY - targetRect.top;
        dragStartLeft = targetRect.left - boundaryRect.left;
        dragStartTop = targetRect.top - boundaryRect.top;

        if (canStartGroupDrag) {
            const items = Array.from(selectedElements)
                .filter(el => resolveDragBoundary(el) === boundary)
                .map((el) => {
                    const rect = el.getBoundingClientRect();
                    return {
                        el,
                        startRect: rect,
                        startLeft: rect.left - boundaryRect.left,
                        startTop: rect.top - boundaryRect.top
                    };
                });

            if (items.length > 1) {
                const groupLeft = Math.min(...items.map(item => item.startLeft));
                const groupTop = Math.min(...items.map(item => item.startTop));
                const groupRight = Math.max(...items.map(item => item.startLeft + item.startRect.width));
                const groupBottom = Math.max(...items.map(item => item.startTop + item.startRect.height));
                dragGroupState = { items, groupLeft, groupTop, groupRight, groupBottom };
            } else {
                dragGroupState = null;
            }
        } else {
            dragGroupState = null;
        }

        e.preventDefault();
        e.stopPropagation();
    }, true);

    // 双击编辑功能
    function enableDoubleClickEdit() {
        // 先清除可能已有的事件监听器
        document.querySelectorAll('[data-edit-bound="true"]').forEach(el => {
            // 移除双击事件监听器
            if (el._hasDblClickListener) {
                el._hasDblClickListener = false;
            }
            // 移除其他可能的事件监听器
            if (el._hasBlurListener) {
                el.removeEventListener('blur', el._blurHandler);
                el._hasBlurListener = false;
            }
            if (el._hasKeydownListener) {
                el.removeEventListener('keydown', el._keydownHandler);
                el._hasKeydownListener = false;
            }
        });
        
        const selectors = ['h1','h2','h3','h4','p','li','.stat-block strong','.quote','.path-item p','.feature-card p','.feature-card h4','.col h4','.insight-list li','.badge','footer','.path-item span','div[style*="background"] strong','.two-columns-extra strong','.achievement-extra span','.path-extra span','.hero-wrapper p','.blank-content span','.textbox-widget p','.textbox-widget .textbox-content','td.table-cell'];
        const targets = document.querySelectorAll('.content-wrapper ' + selectors.join(', .content-wrapper '));
        targets.forEach(el => {
            el.setAttribute('data-edit-bound', 'true');
            // 标记元素已经有双击监听器
            if (!el._hasDblClickListener) {
                el.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    if (el.getAttribute('contenteditable') === 'true') return;
                    if (el.closest('.textbox-widget')) {
                        const placeholderText = (el.getAttribute('data-placeholder') || '在此输入文本').trim();
                        if ((el.textContent || '').trim() === placeholderText || (el.textContent || '').trim() === '在此输入文本') {
                            el.textContent = '';
                        }
                    }
                    el.setAttribute('contenteditable', 'true');
                    setEditingAutoWidth(el, true);
                    el.focus();
                    const onBlur = () => { 
                        if (deferBlurWhenToolbarActive(el)) return;
                        setEditingAutoWidth(el, false);
                        if (!persistTextBoxContainerState(el)) {
                            persistElementContent(el);
                            persistElementSize(el);
                        }
                        el.removeAttribute('contenteditable');
                        el._hasBlurListener = false;
                        el.removeEventListener('blur', onBlur); 
                        el.removeEventListener('keydown', onKeyDown); 
                        el._hasKeydownListener = false;
                    };
                    const onKeyDown = (ev) => {
                        if (ev.key === 'Escape') {
                            ev.preventDefault();
                            el.blur();
                        } else if (ev.key === 'Enter' && !ev.shiftKey) {
                            ev.preventDefault();
                            el.blur();
                        } else if (ev.key === 'Enter' && ev.shiftKey) {
                            ev.preventDefault();
                            insertLineBreakAtCursor();
                        }
                    };
                    el.addEventListener('blur', onBlur);
                    el._hasBlurListener = true;
                    el.addEventListener('keydown', onKeyDown);
                    el._hasKeydownListener = true;
                });
                el._hasDblClickListener = true;
            }
        });
        document.querySelectorAll('.hero-wrapper p, .hero-wrapper div p').forEach(el => {
            el.setAttribute('data-edit-bound', 'true');
            if (!el._hasDblClickListener) {
                el.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    if (el.getAttribute('contenteditable') === 'true') return;
                    el.setAttribute('contenteditable', 'true');
                    setEditingAutoWidth(el, true);
                    el.focus();
                    const onBlur = () => { 
                        if (deferBlurWhenToolbarActive(el)) return;
                        setEditingAutoWidth(el, false);
                        persistElementContent(el);
                        persistElementSize(el);
                        el.removeAttribute('contenteditable');
                        el._hasBlurListener = false;
                        el.removeEventListener('blur', onBlur); 
                        el.removeEventListener('keydown', onKeyDown); 
                        el._hasKeydownListener = false;
                    };
                    const onKeyDown = (ev) => {
                        if (ev.key === 'Escape') {
                            ev.preventDefault();
                            el.blur();
                        } else if (ev.key === 'Enter' && !ev.shiftKey) {
                            ev.preventDefault();
                            el.blur();
                        } else if (ev.key === 'Enter' && ev.shiftKey) {
                            ev.preventDefault();
                            insertLineBreakAtCursor();
                        }
                    };
                    el.addEventListener('blur', onBlur);
                    el._hasBlurListener = true;
                    el.addEventListener('keydown', onKeyDown);
                    el._hasKeydownListener = true;
                });
                el._hasDblClickListener = true;
            }
        });
        
        // 为新添加的空白幻灯片内容添加编辑功能
        document.querySelectorAll('.content-wrapper .quote span, .content-wrapper .blank-content span').forEach(el => {
            el.setAttribute('data-edit-bound', 'true');
            if (!el._hasDblClickListener) {
                el.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    if (el.getAttribute('contenteditable') === 'true') return;
                    el.setAttribute('contenteditable', 'true');
                    setEditingAutoWidth(el, true);
                    el.focus();
                    const onBlur = () => { 
                        if (deferBlurWhenToolbarActive(el)) return;
                        setEditingAutoWidth(el, false);
                        persistElementContent(el);
                        persistElementSize(el);
                        el.removeAttribute('contenteditable');
                        el._hasBlurListener = false;
                        el.removeEventListener('blur', onBlur); 
                        el.removeEventListener('keydown', onEnter); 
                        el._hasKeydownListener = false;
                        // 更新幻灯片数据
                        const slideIndex = Array.from(document.querySelectorAll('.slide')).findIndex(slide => 
                            slide.contains(el.closest('.content-wrapper'))
                        );
                        if (slideIndex !== -1 && slidesData[slideIndex]?.type === 'blank') {
                            slidesData[slideIndex].content = el.innerHTML;
                            updateCache('slidesData', slidesData);
                        }
                    };
                    const onEnter = (ev) => {
                        if (ev.key !== 'Enter') return;
                        if (ev.shiftKey) {
                            ev.preventDefault();
                            insertLineBreakAtCursor();
                            return;
                        }
                        ev.preventDefault();
                        el.blur();
                    };
                    el.addEventListener('blur', onBlur);
                    el._hasBlurListener = true;
                    el.addEventListener('keydown', onEnter);
                    el._hasKeydownListener = true;
                });
                el._hasDblClickListener = true;
            }
        });
    }

    // 主题切换函数（改变body类，并触发样式重绘，保留DOM内容）
    function switchTheme(themeName) {
        const body = document.body;
        const themes = ['red', 'blue', 'purple', 'minimal', 'office'];
        themes.forEach(t => body.classList.remove(`theme-${t}`));
        body.classList.add(`theme-${themeName}`);
        // 更新面板中主题按钮高亮
        document.querySelectorAll('.theme-preview-btn').forEach(btn => {
            if (btn.getAttribute('data-theme') === themeName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        // 保存到缓存
        updateCache('theme', themeName);
    }

    function downloadFile(content, filename, type = 'text/plain;charset=utf-8') {
        const blob = new Blob([content], { type });
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(downloadUrl), 0);
    }

    function bindOnce(el, key, eventName, handler) {
        if (!el || el[key]) return;
        el.addEventListener(eventName, handler);
        el[key] = true;
    }

    function refreshSlidesUI(targetIndex = currentIdx) {
        renderSlides();
        generateThumbnails();
        const slides = document.querySelectorAll('.slide');
        totalSlides = slides.length;
        if (!slides.length) {
            currentIdx = 0;
            return;
        }
        currentIdx = Math.max(0, Math.min(targetIndex, slides.length - 1));
        updateSlidesAndThumbnails();
        enableDoubleClickEdit();
        enableDraggableElements();
    }

    function duplicateCurrentSlide() {
        const currentSlideData = JSON.parse(JSON.stringify(slidesData[currentIdx] || {}));
        slidesData.splice(currentIdx + 1, 0, currentSlideData);
        refreshSlidesUI(currentIdx + 1);
        updateCache('slidesData', slidesData);
    }

    function deleteCurrentSlideWithGuard() {
        if (slidesData.length <= 1) {
            alert('不能删除最后一个幻灯片！');
            return;
        }
        slidesData.splice(currentIdx, 1);
        refreshSlidesUI(Math.min(currentIdx, slidesData.length - 1));
        updateCache('slidesData', slidesData);
    }

    function resetAppState() {
        slidesData = JSON.parse(JSON.stringify(initialSlidesData));
        refreshSlidesUI(0);
        switchTheme('red');
    }

    function clearCacheWithConfirm() {
        showCustomConfirmDialog({
            title: '确认清空缓存',
            message: '确定要清空本地缓存吗？这将重置所有幻灯片到初始状态。',
            okText: '清空',
            cancelText: '取消',
            danger: true
        }).then((ok) => {
            if (!ok) return;
            localStorage.removeItem(FILE_KEY);
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'pptCacheCleared', fileKey: FILE_KEY }, '*');
            }
            resetAppState();
            showCustomConfirmDialog({
                title: '操作完成',
                message: '缓存已清空，已重置为初始状态。',
                okText: '知道了',
                danger: false,
                showCancel: false
            });
        });
    }

    function runExportAction(action, label) {
        Promise.resolve(action()).catch((err) => {
            showCustomConfirmDialog({
                title: '导出失败',
                message: `无法导出${label}：${err && err.message ? err.message : '未知错误'}`,
                okText: '知道了',
                danger: true,
                showCancel: false
            });
        });
    }

    const TOOLBAR_ACTION_MAP = {
        undoBtn: (btn) => {
            if (btn.classList.contains('disabled')) return;
            performUndo();

            setCurrentSlideTransition(btn.dataset.transition);

    function addNewSlide(afterIndex = -1) {
        // 创建新的幻灯片数据

            type: 'blank',

    // 触摸/键盘事件
    let touchStartX = 0;
    let isDraggingForSlide = false;
    function handleTouchStart(e) {
        // 如果触摸的是可拖动元素，不触发翻页
        if (e.target.closest('.draggable')) {
            isDraggingForSlide = false;
            return;
        }
        isDraggingForSlide = true;
        touchStartX = e.changedTouches[0].screenX;
    }
    function handleTouchEnd(e) {
        if (!isDraggingForSlide) return;
        const diff = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(diff) > 50) diff > 0 ? prevSlide() : nextSlide();
        isDraggingForSlide = false;
    }

    function parsePixelValue(value, fallback = NaN) {
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
    }

    function resolvePasteTargetContainer(activeSlide) {
        if (!activeSlide) return null;
        const defaultContainer = activeSlide.querySelector('.content-wrapper');
        if (!defaultContainer) return null;
        if (!selectedElement || selectedElement === defaultContainer) return defaultContainer;
        if (!activeSlide.contains(selectedElement)) return defaultContainer;
        if (selectedElement.getAttribute('data-drag-boundary') === 'true') return selectedElement;

        const boundary = resolveDragBoundary(selectedElement);
        return boundary && activeSlide.contains(boundary) ? boundary : defaultContainer;
    }

    function getPasteStartPosition(targetContainer, clipboard, offset = 20) {
        let left = parsePixelValue(clipboard?.style?.left);
        let top = parsePixelValue(clipboard?.style?.top);

        if (!Number.isFinite(left) || !Number.isFinite(top)) {
            const sourceRect = clipboard?.rect;
            if (sourceRect && targetContainer) {
                const targetRect = targetContainer.getBoundingClientRect();
                left = sourceRect.left - targetRect.left;
                top = sourceRect.top - targetRect.top;
            }
        }

        if (!Number.isFinite(left)) left = 0;
        if (!Number.isFinite(top)) top = 0;
        return { left: left + offset, top: top + offset };
    }

    function constrainPastedElementWithinContainer(el, targetContainer, preferredLeft, preferredTop) {
        if (!el || !targetContainer) return;
        if (getComputedStyle(targetContainer).position === 'static') {
            targetContainer.style.position = 'relative';
        }

        const boundaryRect = targetContainer.getBoundingClientRect();
        const boundaryWidth = Math.max(1, Math.floor(boundaryRect.width));
        const boundaryHeight = Math.max(1, Math.floor(boundaryRect.height));

        if (el.offsetWidth > boundaryWidth) el.style.width = `${boundaryWidth}px`;
        if (el.offsetHeight > boundaryHeight) el.style.height = `${boundaryHeight}px`;

        const maxX = Math.max(0, boundaryRect.width - el.offsetWidth);
        const maxY = Math.max(0, boundaryRect.height - el.offsetHeight);
        const nextLeft = Number.isFinite(preferredLeft) ? preferredLeft : 20;
        const nextTop = Number.isFinite(preferredTop) ? preferredTop : 20;

        el.style.left = `${Math.max(0, Math.min(nextLeft, maxX))}px`;
        el.style.top = `${Math.max(0, Math.min(nextTop, maxY))}px`;
    }

    function pasteInternalClipboardElement() {
        if (isTypingContextActive()) return false;
        if (!clipboardElement) return false;

        // 创建新元素：优先保留原标签，避免把文本元素统一降级为 div 导致编辑选择器失效
        const sourceTag = (clipboardElement.tagName || 'DIV').toUpperCase();
        const safeTag = /^[A-Z][A-Z0-9-]*$/.test(sourceTag) ? sourceTag : 'DIV';
        const newElement = document.createElement(safeTag.toLowerCase());
        newElement.innerHTML = clipboardElement.content;
        // 复制原元素的类名，但排除可能导致问题的标签相关类
        newElement.className = clipboardElement.className;
        if (clipboardElement.id) {
            newElement.id = clipboardElement.id + '-copy-' + Date.now(); // 避免ID重复，添加时间戳
        }
        Object.assign(newElement.dataset, clipboardElement.dataset);

        // 设置样式
        newElement.style.position = 'absolute';
        if (safeTag === 'LI') {
            // 脱离列表粘贴时，避免出现默认项目符号
            newElement.style.listStyle = 'none';
        }
        if (clipboardElement.style.width) newElement.style.width = clipboardElement.style.width;
        if (clipboardElement.style.height) newElement.style.height = clipboardElement.style.height;

        // 直接粘贴到当前活动幻灯片的内容包装器中，不考虑原元素的容器关系
        const activeSlide = document.querySelector('#slidesContainer .slide.active');
        const targetContainer = resolvePasteTargetContainer(activeSlide);
        if (!targetContainer) return false;

        const pasteStart = getPasteStartPosition(targetContainer, clipboardElement, 20);
        targetContainer.appendChild(newElement);
        constrainPastedElementWithinContainer(newElement, targetContainer, pasteStart.left, pasteStart.top);

        // 确保新元素具有可拖拽类
        newElement.classList.add('draggable');

        // 确保新元素具有正确的容器类
        if (['feature-card', 'stat-block', 'col', 'path-item', 'quote', 'achievement-extra', 'path-extra', 'two-columns-extra', 'blank-content', 'table-widget'].some(cls => newElement.classList.contains(cls))) {
            newElement.classList.add('resizable-container');
        }

        // 启用新元素的拖拽和编辑功能
        enableDraggableElements();
        enableDoubleClickEdit();

        // 粘贴后立即持久化，避免刷新后丢失
        ensureDynamicElementId(newElement, 'dynamic');
        upsertDynamicElementInSlide(activeSlide, 'html', newElement);
        persistElementPosition(newElement);
        persistElementSize(newElement);
        persistElementContent(newElement);

        return true;
    }

    function shouldPreferInternalPasteOnCtrlV() {
        return !!(clipboardElement && (selectedElement || (selectedElements && selectedElements.size > 0)));
    }

    function handleKeyDown(e) {
        if (activeConfirmDialog && activeConfirmDialog.isConnected) {
            if (!(e.target instanceof Node) || !activeConfirmDialog.contains(e.target)) {
                e.preventDefault();
            }
            return;
        }
        const isModifierPressed = e.ctrlKey || e.metaKey;
        const normalizedKey = (e.key || '').toLowerCase();

        if (isModifierPressed && normalizedKey === 'z') {
            if (isTypingContextActive()) return;
            e.preventDefault();
            if (e.shiftKey) performRedo();
            else performUndo();
            return;
        }

        if (isModifierPressed && normalizedKey === 'y') {
            if (isTypingContextActive()) return;
            e.preventDefault();
            performRedo();
            return;
        }

        // 处理 Ctrl+C 复制选中的元素
        if (isModifierPressed && normalizedKey === 'c') {
            if (isTypingContextActive()) return;
            if (!selectedElement) return;

            // 复制选中的元素到剪贴板变量
            clipboardElement = {
                outerHTML: selectedElement.outerHTML,
                className: selectedElement.className,
                tagName: selectedElement.tagName,
                id: selectedElement.id,
                dataset: { ...selectedElement.dataset },
                style: {
                    position: selectedElement.style.position,
                    left: selectedElement.style.left,
                    top: selectedElement.style.top,
                    width: selectedElement.style.width,
                    height: selectedElement.style.height
                },
                rect: selectedElement.getBoundingClientRect(),
                content: selectedElement.innerHTML
            };

            e.preventDefault();
            return;
        }

        // Ctrl+Shift+V 强制执行内部元素粘贴
        if (isModifierPressed && normalizedKey === 'v' && e.shiftKey) {
            if (pasteInternalClipboardElement()) {
                e.preventDefault();
            }
            return;
        }
        
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (isTypingContextActive()) return;
            if (draggedElement || resizingElement || resizeGroupState || marqueeState.active) return;
            if (activeConfirmDialog) {
                e.preventDefault();
                return;
            }
            if (selectedElements.size > 1) {
                e.preventDefault();
                showDeleteConfirmDialog(selectedElements.size).then((ok) => {
                    if (ok) deleteCurrentSelectedElements();
                });
                return;
            }
            if (deleteCurrentSelectedElements()) {
                e.preventDefault();
            }
            return;
        }
        if (e.key === 'ArrowRight') {
            nextSlide();
            e.preventDefault();
        } else if (e.key === 'ArrowLeft') {
            prevSlide();
            e.preventDefault();
        }
    }
    let mouseStartX = 0;
    let isMouseDraggingForSlide = false;
    function handleMouseDown(e) {
        if (activeConfirmDialog && activeConfirmDialog.isConnected) {
            if (!(e.target instanceof Node) || !activeConfirmDialog.contains(e.target)) {
                e.preventDefault();
            }
            isMouseDraggingForSlide = false;
            return;
        }
        // 如果点击的是图标元素（i），不触发翻页
        if (e.target.tagName === 'I' || e.target.tagName === 'i') {
            isMouseDraggingForSlide = false;
            return;
        }
        // 如果点击的是可拖动元素或工具栏，不触发翻页
        if (e.target.closest('.draggable') || e.target.closest('.ppt-toolbar') || e.target.closest('.toolbar-panels')) {
            isMouseDraggingForSlide = false;
            return;
        }
        if (e.button === 0) {
            isMouseDraggingForSlide = true;
            mouseStartX = e.clientX;
        }
    }
    function handleMouseUp(e) {
        if (activeConfirmDialog && activeConfirmDialog.isConnected) {
            isMouseDraggingForSlide = false;
            return;
        }
        if (!isMouseDraggingForSlide) return;
        if (e.button !== 0) return;
        const diff = e.clientX - mouseStartX;
        if (Math.abs(diff) > 70) diff > 0 ? prevSlide() : nextSlide();
        isMouseDraggingForSlide = false;
    }

    // 初始化
    // 保存初始幻灯片数据用于重置
    const initialSlidesData = JSON.parse(JSON.stringify(slidesData));

    // ========== 全屏播放功能 ==========
    let isFullscreenMode = false;
    let autoSlideTimer = null;

    function stopAutoSlideTimer() {
        if (autoSlideTimer) {
            clearInterval(autoSlideTimer);
            autoSlideTimer = null;
        }
    }

    function startAutoSlideTimer() {
        stopAutoSlideTimer();
        if (!isFullscreenMode || !isAutoSlideEnabled()) return;
        const intervalMs = getAutoSlideIntervalMs();
        autoSlideTimer = setInterval(() => {
            if (!isFullscreenMode || !isAutoSlideEnabled()) {
                stopAutoSlideTimer();
                return;
            }
            if (currentIdx >= totalSlides - 1) {
                goToSlide(0, 1);
            } else {
                nextSlide();
            }
        }, intervalMs);
    }

    function restartAutoSlideTimer() {
        if (!isFullscreenMode || !isAutoSlideEnabled()) {
            stopAutoSlideTimer();
            return;
        }
        startAutoSlideTimer();
    }

    function enterFullscreenMode() {
        isFullscreenMode = true;
        document.body.classList.add('fullscreen-mode');
        refreshElementAnimationOrderBadges();

        // 请求浏览器全屏
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }

        // 3秒后隐藏退出提示
        const hint = document.getElementById('fullscreenExitHint');
        if (hint) {
            hint.classList.remove('hidden');
            setTimeout(() => {
                hint.classList.add('hidden');
            }, 3000);
        }
        playElementAnimationsForActiveSlide();
        startAutoSlideTimer();
    }

    function exitFullscreenMode() {
        isFullscreenMode = false;
        stopAutoSlideTimer();
        document.body.classList.remove('fullscreen-mode');

        // 退出浏览器全屏
        if (document.exitFullscreen) {
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    }

    function toggleFullscreenMode() {
        if (isFullscreenMode) {
            exitFullscreenMode();
        } else {
            enterFullscreenMode();
        }
    }

    function initFullscreenFeature() {
        // 绑定播放按钮点击事件
        const playBtn = document.getElementById('playBtn');
        if (playBtn) {
            playBtn.addEventListener('click', enterFullscreenMode);
        }

        // 监听 ESC 键退出全屏
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreenMode) {
                exitFullscreenMode();
            }
        });

        // 监听浏览器全屏状态变化（用户按 F11 或 ESC）
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isFullscreenMode) {
                // 浏览器已退出全屏，同步状态
                isFullscreenMode = false;
                stopAutoSlideTimer();
                document.body.classList.remove('fullscreen-mode');
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement && isFullscreenMode) {
                isFullscreenMode = false;
                stopAutoSlideTimer();
                document.body.classList.remove('fullscreen-mode');
            }
        });

        document.addEventListener('msfullscreenchange', () => {
            if (!document.msFullscreenElement && isFullscreenMode) {
                isFullscreenMode = false;
                stopAutoSlideTimer();
                document.body.classList.remove('fullscreen-mode');
            }
        });

        // 全屏模式下的键盘控制（翻页键）
        document.addEventListener('keydown', (e) => {
            if (!isFullscreenMode) return;
            
            // PageDown / Space / N / Enter -> 下一页
            if (e.key === 'PageDown' || e.key === ' ' || e.key === 'N' || e.key === 'n' || e.key === 'Enter') {
                e.preventDefault();
                nextSlide();
            }
            // PageUp / P -> 上一页
            else if (e.key === 'PageUp' || e.key === 'P' || e.key === 'p') {
                e.preventDefault();
                prevSlide();
            }
            // Home -> 第一页
            else if (e.key === 'Home') {
                e.preventDefault();
                goToSlide(0);
            }
            // End -> 最后一页
            else if (e.key === 'End') {
                e.preventDefault();
                goToSlide(totalSlides - 1);
            }
        });

        // 全屏模式下的鼠标滚轮控制
        let wheelThrottle = false;
        document.addEventListener('wheel', (e) => {
            if (!isFullscreenMode) return;
            
            e.preventDefault();
            
            if (wheelThrottle) return;
            wheelThrottle = true;
            
            // deltaY > 0 向下滚动 -> 下一页
            // deltaY < 0 向上滚动 -> 上一页
            if (e.deltaY > 0) {
                nextSlide();
            } else if (e.deltaY < 0) {
                prevSlide();
            }
            
            // 节流，防止滚动过快
            setTimeout(() => {
                wheelThrottle = false;
            }, 300);
        }, { passive: false });
    }

    function init() {
        // 尝试从缓存加载幻灯片数据
        const cache = getCache();
        initThumbnailPanelToggle(cache);
        if (cache.slidesData && cache.slidesData.length > 0) {
            // 使用缓存数据替换当前数据
            slidesData = cache.slidesData;
        }

        renderSlides();
        hydrateOfflineIcons(document);
        applyDeletedElementsToAllSlides(cache);
        const slides = document.querySelectorAll('.slide');
        totalSlides = slides.length;
        generateThumbnails();
        enableDoubleClickEdit();
        enableDraggableElements();
        initToolbarTabs();
        initTransitionTimingInputs();
        initElementAnimationControls();
        refreshTransitionTimingButtons();
        refreshElementAnimationPanel();
        updateBackgroundScopeButtons();
        initFullscreenFeature();
        
        // 恢复批注
        setTimeout(() => restoreElementComments(), 100);

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('paste', handleClipboardImagePaste);
        document.body.addEventListener('touchstart', handleTouchStart);
        document.body.addEventListener('touchend', handleTouchEnd);
        document.body.addEventListener('mousedown', handleMouseDown, true); // 使用捕获阶段
        document.body.addEventListener('mouseup', handleMouseUp);

        // 加载存储主题或默认红色
        const savedTheme = cache.theme;
        if (savedTheme && ['red','blue','purple','minimal','office'].includes(savedTheme)) {
            switchTheme(savedTheme);
        } else {
            switchTheme('red');
        }

        resetHistoryWithCache(getCache(), 'init');
    }

    // 创建自定义弹窗用于输入表格行列数
    function showTableInputDialog() {
        return new Promise((resolve) => {
            // 创建遮罩层
            const overlay = document.createElement('div');
            overlay.className = 'custom-confirm-overlay';
            overlay.style.zIndex = '6000';

            // 创建对话框
            const dialog = document.createElement('div');
            dialog.className = 'custom-confirm-dialog table-dialog';

            // 对话框内容
            dialog.innerHTML = `
                <div class="custom-confirm-title">插入表格</div>
                <div class="custom-confirm-text table-dialog-fields">
                    <div class="table-dialog-field">
                        <label class="table-dialog-label">请输入行数：</label>
                        <input class="table-dialog-input" type="number" id="tableRows" min="1" max="20" value="3">
                    </div>
                    <div class="table-dialog-field">
                        <label class="table-dialog-label">请输入列数：</label>
                        <input class="table-dialog-input" type="number" id="tableCols" min="1" max="20" value="3">
                    </div>
                </div>
                <div class="custom-confirm-actions">
                    <button class="custom-confirm-btn" id="tableCancelBtn">取消</button>
                    <button class="custom-confirm-btn primary" id="tableOkBtn">确定</button>
                </div>
            `;

            overlay.appendChild(dialog);
            document.body.appendChild(overlay);

            const okBtn = document.getElementById('tableOkBtn');
            const cancelBtn = document.getElementById('tableCancelBtn');
            const rowsInput = document.getElementById('tableRows');
            const colsInput = document.getElementById('tableCols');

            const closeDialog = (result) => {
                document.removeEventListener('keydown', handleEsc);
                rowsInput.removeEventListener('keydown', handleEnter);
                colsInput.removeEventListener('keydown', handleEnter);
                if (overlay.isConnected) {
                    document.body.removeChild(overlay);
                }
                resolve(result);
            };

            // 限制输入范围
            rowsInput.addEventListener('change', () => {
                const val = parseInt(rowsInput.value, 10);
                if (val < 1) rowsInput.value = 1;
                if (val > 20) rowsInput.value = 20;
            });

            colsInput.addEventListener('change', () => {
                const val = parseInt(colsInput.value, 10);
                if (val < 1) colsInput.value = 1;
                if (val > 20) colsInput.value = 20;
            });

            // 确定按钮事件
            okBtn.addEventListener('click', () => {
                const rows = parseInt(rowsInput.value, 10);
                const cols = parseInt(colsInput.value, 10);

                if (isNaN(rows) || isNaN(cols) || rows < 1 || cols < 1 || rows > 20 || cols > 20) {
                    alert('请输入有效的行数和列数（1-20之间）');
                    return;
                }

                closeDialog({ rows, cols });
            });

            // 取消按钮事件
            cancelBtn.addEventListener('click', () => {
                closeDialog(null);
            });

            // 点击遮罩关闭
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    closeDialog(null);
                }
            });

            // ESC键关闭
            const handleEsc = (e) => {
                if (e.key === 'Escape') {
                    closeDialog(null);
                }
            };
            document.addEventListener('keydown', handleEsc);

            // 输入框回车事件
            const handleEnter = (e) => {
                if (e.key === 'Enter') {
                    okBtn.click();
                }
            };
            rowsInput.addEventListener('keydown', handleEnter);
            colsInput.addEventListener('keydown', handleEnter);

            // 聚焦第一个输入框
            setTimeout(() => {
                rowsInput.focus();
            }, 100);
        });
    }

    // 创建表格元素
    function updateDynamicTableCacheFromContainer(tableContainer) {
        if (!tableContainer) return;
        const slideEl = tableContainer.closest('.slide');
        if (!slideEl) return;
        const slideIndex = Array.from(document.querySelectorAll('.slide')).indexOf(slideEl);
        if (slideIndex < 0 || !slidesData[slideIndex].dynamicElements) return;

        const dynamicElements = slidesData[slideIndex].dynamicElements;
        const dynamicId = tableContainer.dataset.dynamicId || tableContainer.id || '';
        let dynamicElement = dynamicElements.find(el => el.type === 'table' && (el.id === dynamicId || el.id === tableContainer.id));

        if (!dynamicElement) {
            const renderedTables = Array.from(slideEl.querySelectorAll('.table-widget'));
            const renderedIdx = renderedTables.indexOf(tableContainer);
            const tableDynamics = dynamicElements.filter(el => el.type === 'table');
            if (renderedIdx >= 0 && renderedIdx < tableDynamics.length) {
                dynamicElement = tableDynamics[renderedIdx];
            }
        }

        if (!dynamicElement) return;
        if (!dynamicElement.id) dynamicElement.id = dynamicId || tableContainer.id || `table-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
        if (!tableContainer.id) tableContainer.id = dynamicElement.id;
        tableContainer.dataset.dynamicId = dynamicElement.id;

        // 创建一个副本以避免保存编辑状态
        const tableClone = tableContainer.cloneNode(true);

        // 清理克隆元素上的编辑状态
        const editableCells = tableClone.querySelectorAll('[contenteditable="true"]');
        editableCells.forEach(cell => {
            cell.removeAttribute('contenteditable');
            // 移除任何可能添加的编辑样式
            cell.classList.remove('editing');
        });

        dynamicElement.html = tableClone.outerHTML;
        updateCache('slidesData', slidesData);
    }

    function updateDynamicTableCacheFromCell(cell) {
        const tableContainer = cell.closest('.table-widget') || cell.closest('.resizable-container');
        if (!tableContainer) return;
        updateDynamicTableCacheFromContainer(tableContainer);
    }

    function detectTableResizeEdge(tableContainer, clientX, clientY) {
        if (!tableContainer || !tableContainer.querySelector('table')) return null;
        const table = tableContainer.querySelector('table');
        const tableRect = table.getBoundingClientRect();
        if (clientX < tableRect.left || clientX > tableRect.right || clientY < tableRect.top || clientY > tableRect.bottom) return null;

        const threshold = 5;
        let hit = null;

        const headerCells = table.rows[0] ? Array.from(table.rows[0].cells) : [];
        for (let i = 0; i < headerCells.length - 1; i++) {
            const edgeX = headerCells[i].getBoundingClientRect().right;
            const dist = Math.abs(clientX - edgeX);
            if (dist <= threshold) {
                if (!hit || dist < hit.dist) hit = { axis: 'col', index: i, dist };
            }
        }

        const rows = Array.from(table.rows);
        for (let i = 0; i < rows.length - 1; i++) {
            const edgeY = rows[i].getBoundingClientRect().bottom;
            const dist = Math.abs(clientY - edgeY);
            if (dist <= threshold) {
                if (!hit || dist < hit.dist) hit = { axis: 'row', index: i, dist };
            }
        }

        return hit;
    }

    function getTableColumnWidths(table) {
        if (!table || !table.rows.length) return [];
        return Array.from(table.rows[0].cells).map((cell) => Math.max(24, Math.round(cell.getBoundingClientRect().width)));
    }

    function getTableRowHeights(table) {
        if (!table) return [];
        return Array.from(table.rows).map((row) => Math.max(22, Math.round(row.getBoundingClientRect().height)));
    }

    function applyTableColumnWidths(table, widths) {
        Array.from(table.rows).forEach((row) => {
            Array.from(row.cells).forEach((cell, idx) => {
                if (idx < widths.length) cell.style.width = `${widths[idx]}px`;
            });
        });
    }

    function applyTableRowHeights(table, heights) {
        Array.from(table.rows).forEach((row, idx) => {
            if (idx < heights.length) row.style.height = `${heights[idx]}px`;
        });
    }

    function setTableResizeCursor(tableContainer, cursor) {
        if (!tableContainer) return;
        tableContainer.style.cursor = cursor || '';
        const table = tableContainer.querySelector('table');
        if (table) table.style.cursor = cursor || '';
        tableContainer.querySelectorAll('td, th').forEach((cell) => {
            cell.style.cursor = cursor || '';
        });
    }

    function applyTableGridResizeMove(clientX, clientY) {
        if (!tableGridResizeState.active || !tableGridResizeState.tableContainer) return;
        const tableContainer = tableGridResizeState.tableContainer;
        const table = tableContainer.querySelector('table');
        if (!table) return;

        if (tableGridResizeState.axis === 'col') {
            const widths = tableGridResizeState.startWidths.slice();
            const i = tableGridResizeState.index;
            if (i >= 0 && i < widths.length) {
                const delta = clientX - tableGridResizeState.startClientX;
                widths[i] = Math.max(40, tableGridResizeState.startWidths[i] + delta);
                applyTableColumnWidths(table, widths);
                const totalW = widths.reduce((a, b) => a + b, 0);
                tableContainer.style.width = `${totalW}px`;
                tableContainer.style.minWidth = `${totalW}px`;
            }
        } else if (tableGridResizeState.axis === 'row') {
            const heights = tableGridResizeState.startHeights.slice();
            const i = tableGridResizeState.index;
            if (i >= 0 && i < heights.length) {
                const delta = clientY - tableGridResizeState.startClientY;
                heights[i] = Math.max(26, tableGridResizeState.startHeights[i] + delta);
                applyTableRowHeights(table, heights);
                const totalH = heights.reduce((a, b) => a + b, 0);
                tableContainer.style.height = `${totalH}px`;
                tableContainer.style.minHeight = `${totalH}px`;
            }
        }
    }

    function updateTableGridResizeHover(clientX, clientY) {
        if (tableGridResizeState.active) return;
        const el = document.elementFromPoint(clientX, clientY);
        const tableContainer = el ? el.closest('.table-widget') : null;
        if (!tableContainer || tableContainer.getAttribute('contenteditable') === 'true' || el?.closest('[contenteditable="true"]')) {
            document.body.style.cursor = '';
            if (tableGridResizeState.tableContainer) setTableResizeCursor(tableGridResizeState.tableContainer, '');
            return;
        }
        const hit = detectTableResizeEdge(tableContainer, clientX, clientY);
        const cursor = hit ? (hit.axis === 'col' ? 'col-resize' : 'row-resize') : '';
        document.body.style.cursor = cursor;
        setTableResizeCursor(tableContainer, cursor);
    }

    function handleTableGridResizeMouseDown(e) {
        const tableContainer = e.target.closest('.table-widget');
        if (!tableContainer) return false;
        if (tableContainer.getAttribute('contenteditable') === 'true' || e.target.closest('[contenteditable="true"]')) return false;
        const hit = detectTableResizeEdge(tableContainer, e.clientX, e.clientY);
        if (!hit) return false;
        const table = tableContainer.querySelector('table');
        if (!table) return false;

        tableGridResizeState.active = true;
        tableGridResizeState.tableContainer = tableContainer;
        tableGridResizeState.axis = hit.axis;
        tableGridResizeState.index = hit.index;
        tableGridResizeState.startClientX = e.clientX;
        tableGridResizeState.startClientY = e.clientY;
        tableGridResizeState.startWidths = getTableColumnWidths(table);
        tableGridResizeState.startHeights = getTableRowHeights(table);

        const cursor = hit.axis === 'col' ? 'col-resize' : 'row-resize';
        document.body.style.cursor = cursor;
        setTableResizeCursor(tableContainer, cursor);
        e.preventDefault();
        e.stopPropagation();
        return true;
    }

    function finishTableGridResize() {
        if (!tableGridResizeState.active || !tableGridResizeState.tableContainer) return;
        const tableContainer = tableGridResizeState.tableContainer;
        updateDynamicTableCacheFromContainer(tableContainer);
        persistElementSize(tableContainer);
        scheduleCurrentThumbnailRefresh(currentIdx);

        tableGridResizeState.active = false;
        tableGridResizeState.tableContainer = null;
        tableGridResizeState.axis = '';
        tableGridResizeState.index = -1;
        tableGridResizeState.startClientX = 0;
        tableGridResizeState.startClientY = 0;
        tableGridResizeState.startWidths = [];
        tableGridResizeState.startHeights = [];
        document.body.style.cursor = '';
        setTableResizeCursor(tableContainer, '');
    }

    function createTableElement(rows, cols) {
        const table = document.createElement('div');
        table.className = 'table-widget draggable resizable-container';

        const safeRows = Math.max(1, parseInt(rows, 10) || 1);
        const safeCols = Math.max(1, parseInt(cols, 10) || 1);
        const tableWidth = Math.max(520, safeCols * 140);
        const tableHeight = Math.max(180, safeRows * 44);

        // 使用模板内置表格风格，避免插入表格与模板视觉割裂
        table.style.cssText = `
            position: absolute;
            left: 50px;
            top: 50px;
            width: ${tableWidth}px;
            min-width: ${Math.max(360, safeCols * 110)}px;
            height: ${tableHeight}px;
            min-height: ${Math.max(120, safeRows * 32)}px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 14px;
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            padding: 0;
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
            overflow: hidden;
            box-shadow: 0 10px 24px -20px rgba(15, 23, 42, 0.7);
        `;

        // 生成表格HTML结构
        let tableHtml = '<table style="width:100%; height:100%; border-collapse:collapse; table-layout:fixed; min-width:520px; font-family:\"Microsoft YaHei\", \"微软雅黑\", \"PingFang SC\", sans-serif;">\n';
        for (let i = 0; i < safeRows; i++) {
            const isHeader = i === 0;
            const bgColor = isHeader ? 'rgba(15,23,42,0.06)' : (i % 2 === 1 ? 'rgba(255,255,255,0.68)' : 'rgba(255,255,255,0.5)');
            const fontWeight = isHeader ? '700' : '400';

            tableHtml += '  <tr style="height:' + (100 / safeRows) + '%">\n';
            for (let j = 0; j < safeCols; j++) {
                const defaultText = isHeader ? `表头${j + 1}` : '';
                tableHtml += '    <td class="table-cell" style="padding:9px 12px; border:1px solid rgba(0,0,0,0.1); background:' + bgColor + '; font-weight:' + fontWeight + '; text-align:left; vertical-align:middle; word-break:break-word; color:#1f2937;">' + defaultText + '</td>\n';
            }
            tableHtml += '  </tr>\n';
        }
        tableHtml += '</table>\n';

        table.innerHTML = tableHtml;

        // 添加唯一ID
        const uniqueId = 'table-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        table.id = uniqueId;
        table.dataset.dynamicId = uniqueId;

        // 为每个单元格添加双击编辑功能
        const cells = table.querySelectorAll('td, th');
        cells.forEach(cell => {
            cell.style.cursor = '';
            if (cell._tableEditBound) return;
            cell._tableEditBound = true;
            cell.setAttribute('data-edit-bound', 'true');

            // 添加双击事件监听器
            cell.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (cell.getAttribute('contenteditable') === 'true') return;

                cell.setAttribute('contenteditable', 'true');
                cell.focus();

                // 获取光标位置并设置选择
                const range = document.createRange();
                range.selectNodeContents(cell);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);

                // 失焦处理函数
                const onBlur = () => {
                    if (deferBlurWhenToolbarActive(cell)) return;
                    persistElementContent(cell);
                    persistElementSize(cell);
                    updateDynamicTableCacheFromCell(cell);

                    cell.removeAttribute('contenteditable');
                    cell.removeEventListener('blur', onBlur);
                    cell.removeEventListener('keydown', onEnter);
                    cell.removeEventListener('paste', onPaste);
                };

                // Enter键处理函数
                const onEnter = (ev) => {
                    if (ev.key === 'Enter') {
                        if (ev.shiftKey) {
                            // Shift+Enter 插入换行符
                            ev.preventDefault();
                            insertLineBreakAtCursor();
                            return;
                        } else {
                            // Enter 键失焦并退出编辑模式
                            ev.preventDefault();
                            cell.blur();
                        }
                    } else if (ev.key === 'Escape') {
                        // Escape 键退出编辑模式
                        cell.blur();
                    }
                };

                // 粘贴处理函数
                const onPaste = (e) => {
                    e.preventDefault();
                    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
                    document.execCommand('insertText', false, text);
                };

                // 添加事件监听器
                cell.addEventListener('blur', onBlur);
                cell.addEventListener('keydown', onEnter);
                cell.addEventListener('paste', onPaste);
            });
        });

        return table;
    }

    // 插入表格到当前活动幻灯片或选定容器
    async function insertTable() {
        const result = await showTableInputDialog();
        if (!result) return; // 用户取消

        const { rows, cols } = result;
        const tableElement = createTableElement(rows, cols);

        // 查找当前活动的幻灯片

        // 表格总是插入到底层容器(content-wrapper)，不插入到其他容器中

        if (!targetContainer) {
            console.error('未找到合适的容器');
            return;

        // 添加表格到目标容器
        targetContainer.appendChild(tableElement);

        // 为当前幻灯片保存动态表格信息
        upsertDynamicElementInSlide(activeSlide, 'table', tableElement, { rows, cols });

        // 重新启用拖拽功能以应用到新元素
        enableDraggableElements();


    }

    // 插入图片到当前活动幻灯片
    async function insertImage() {
        // 创建文件输入元素
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        // 监听文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) {
                document.body.removeChild(fileInput);
                return;
            }

            // 读取图片文件
            const reader = new FileReader();
            reader.onload = (event) => {
                const imageSrc = event.target.result;

                insertImageToActiveSlide(imageSrc, file.name);

                // 清理
                document.body.removeChild(fileInput);
            };

            reader.onerror = () => {
                console.error('读取图片文件失败');
                document.body.removeChild(fileInput);
            };

            reader.readAsDataURL(file);
        });

        // 触发文件选择
        fileInput.click();
    }

    function handleClipboardImagePaste(e) {
        if (!e || !e.clipboardData) return;
        if (isTypingContextActive()) return;

        const items = Array.from(e.clipboardData.items || []);
        const imageItem = items.find(item => item && item.kind === 'file' && /^image\//i.test(item.type || ''));

        if (imageItem && shouldPreferInternalPasteOnCtrlV()) {
            if (pasteInternalClipboardElement()) {
                e.preventDefault();
            }
            return;
        }

        if (!imageItem) {
            // 普通 Ctrl+V：剪贴板不是图片时，回退到内部元素粘贴
            if (pasteInternalClipboardElement()) {
                e.preventDefault();
            }
            return;
        }

        const imageFile = imageItem.getAsFile();
        if (!imageFile) return;

        e.preventDefault();

        const reader = new FileReader();
        reader.onload = (event) => {
            const imageSrc = event?.target?.result;
            if (!imageSrc) return;
            const fileName = imageFile.name || 'clipboard-image.png';
            insertImageToActiveSlide(imageSrc, fileName);
        };
        reader.onerror = () => {
            console.error('读取剪贴板图片失败');
        };
        reader.readAsDataURL(imageFile);
    }

    function initToolbarTabs() {

        tabs.forEach(tab => {

                tabs.forEach(t => t.classList.remove('active'));

        function startToolbarDrag(e) {

            if (interactive) return;

        function onToolbarDragMove(e) {

            const maxLeft = Math.max(10, window.innerWidth - toolbar.offsetWidth - 10);
            const maxTop = Math.max(10, window.innerHeight - toolbar.offsetHeight - 10);
            const nextLeft = Math.min(Math.max(10, e.clientX - toolbarDragOffsetX), maxLeft);
            const nextTop = Math.min(Math.max(10, e.clientY - toolbarDragOffsetY), maxTop);

        // 保存当前选区
        let savedRange = null;
        let lastEditableHost = null;
        let savedSelectionOffsets = null;
        let fontSizeSelectionSnapshot = null;

        function getRangeOffsetsWithinHost(host, range) {
            if (!host || !range || !host.contains(range.startContainer) || !host.contains(range.endContainer)) return null;
            const startRange = document.createRange();
            startRange.selectNodeContents(host);
            startRange.setEnd(range.startContainer, range.startOffset);

            const endRange = document.createRange();
            endRange.selectNodeContents(host);
            endRange.setEnd(range.endContainer, range.endOffset);
            return {
                start: startRange.toString().length,
                end: endRange.toString().length
            };
        }

        function createRangeFromOffsets(host, offsets) {
            if (!host || !offsets) return null;
            const startPos = Math.max(0, Number(offsets.start) || 0);
            const endPos = Math.max(startPos, Number(offsets.end) || 0);
            const walker = document.createTreeWalker(host, NodeFilter.SHOW_TEXT, null);
            let current = 0;
            let startNode = null;
            let startOffset = 0;
            let endNode = null;
            let endOffset = 0;
            let node;

            while ((node = walker.nextNode())) {
                const len = (node.textContent || '').length;
                const next = current + len;
                if (!startNode && startPos <= next) {
                    startNode = node;
                    startOffset = Math.max(0, Math.min(len, startPos - current));
                }
                if (!endNode && endPos <= next) {
                    endNode = node;
                    endOffset = Math.max(0, Math.min(len, endPos - current));
                    break;
                }
                current = next;
            }

            if (!startNode) {
                startNode = host;
                startOffset = 0;
            }
            if (!endNode) {
                endNode = startNode;
                endOffset = startOffset;
            }

            const range = document.createRange();
            range.setStart(startNode, startOffset);
            range.setEnd(endNode, endOffset);
            return range;
        }
        function getEditableHostFromSelection(selection) {
            if (!selection || selection.rangeCount === 0) return null;
            const anchorNode = selection.anchorNode;
            if (!anchorNode) return null;
            const anchorEl = anchorNode.nodeType === Node.ELEMENT_NODE ? anchorNode : anchorNode.parentElement;
            return anchorEl ? anchorEl.closest('[contenteditable="true"]') : null;
        }
        function saveSelection() {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const currentRange = selection.getRangeAt(0);
                const host = getEditableHostFromSelection(selection);

                // 工具栏交互期间，如果当前选区已塌陷，不要覆盖已有有效选区快照。
                if (isToolbarEditingInteractionActive() && currentRange.collapsed && savedRange && !savedRange.collapsed) {
                    return;
                }
                // 同样避免被工具栏控件焦点导致的非编辑区选区覆盖。
                if (isToolbarEditingInteractionActive() && !host && savedRange && !savedRange.collapsed) {
                    return;
                }

                savedRange = currentRange.cloneRange();
                if (host) {
                    lastEditableHost = host;
                    savedSelectionOffsets = getRangeOffsetsWithinHost(host, currentRange);
                }
                window.__floatingSavedRange = savedRange.cloneRange();

            if (!savedRange && !savedSelectionOffsets) return;
            const activeEl = document.activeElement;
            const activeEditableHost = activeEl && activeEl.closest ? activeEl.closest('[contenteditable="true"]') : null;
            const needsRefocus = !!(lastEditableHost && lastEditableHost.isConnected && activeEditableHost !== lastEditableHost);
            if (needsRefocus && typeof lastEditableHost.focus === 'function') {
                lastEditableHost.focus({ preventScroll: true });
            }
            const selection = window.getSelection();
            if (!selection) return;

            let targetRange = null;
            const savedRangeValid = !!(savedRange && savedRange.startContainer && savedRange.endContainer && document.contains(savedRange.startContainer) && document.contains(savedRange.endContainer));
            if (savedRangeValid && (!savedRange.collapsed || !savedSelectionOffsets)) {
                targetRange = savedRange.cloneRange();
            }
            if ((!targetRange || targetRange.collapsed) && lastEditableHost && lastEditableHost.isConnected && savedSelectionOffsets) {
                targetRange = createRangeFromOffsets(lastEditableHost, savedSelectionOffsets);
            }
            if (!targetRange && savedRangeValid) {
                targetRange = savedRange.cloneRange();
            }
            if (targetRange && targetRange.collapsed && savedRangeValid && !savedRange.collapsed) {
                targetRange = savedRange.cloneRange();
            }
            if (!targetRange) return;

            selection.removeAllRanges();
            selection.addRange(targetRange);
            if (needsRefocus) {
                const rangeForNextFrame = targetRange.cloneRange();
                requestAnimationFrame(() => {
                    const sel = window.getSelection();
                    if (!sel) return;
                    sel.removeAllRanges();
                    sel.addRange(rangeForNextFrame);
                });
            }
            savedRange = targetRange.cloneRange();
            if (lastEditableHost) {
                savedSelectionOffsets = getRangeOffsetsWithinHost(lastEditableHost, targetRange) || savedSelectionOffsets;
            }
            window.__floatingSavedRange = savedRange.cloneRange();
            window.__floatingLastEditableHost = lastEditableHost;
        }

        function keepSelectionHighlighted() {
            markToolbarEditingInteraction(lastEditableHost);
            const selection = window.getSelection();
            const hasValidLiveSelection = !!(
                selection &&
                selection.rangeCount > 0 &&
                !selection.getRangeAt(0).collapsed &&
                getEditableHostFromSelection(selection)
            );
            if (!hasValidLiveSelection) {
                restoreSelection();
            }
            requestAnimationFrame(() => {
                const nextSelection = window.getSelection();
                const hasValidNextSelection = !!(
                    nextSelection &&
                    nextSelection.rangeCount > 0 &&
                    !nextSelection.getRangeAt(0).collapsed &&

        function buildSelectionSnapshot() {
            if (savedRange && savedRange.startContainer && savedRange.endContainer && document.contains(savedRange.startContainer) && document.contains(savedRange.endContainer)) {
                return {

                };

            if (lastEditableHost && lastEditableHost.isConnected && savedSelectionOffsets) {
                const rangeFromOffsets = createRangeFromOffsets(lastEditableHost, savedSelectionOffsets);
                if (rangeFromOffsets) {
                    return {
